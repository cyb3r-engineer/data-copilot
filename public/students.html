<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Co-Pilot — Students</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f2ee;
      --surface: #faf8f5;
      --border: #e8e3dc;
      --border-hover: #ccc6be;
      --border-strong: #aaa49d;
      --accent-light: #f0ede8;
      --text: #1a1a1a;
      --muted: #888077;
      --hint: #b8b0a5;
      --success: #2d7a4f;
      --success-bg: #f3faf5;
      --success-border: #bfe0cc;
      --warn: #a06b1a;
      --warn-bg: #fdf9f1;
      --warn-border: #e4d3b8;
      --danger: #c0392b;
      --sans: 'Inter', system-ui, sans-serif;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

    /* Sidebar */
    .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 14px; }
    .sidebar-brand { display: flex; align-items: center; gap: 9px; padding: 4px 10px 24px; font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
    .logo-mark { font-size: 18px; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 2px; }
    .side-link { display: flex; align-items: center; gap: 11px; padding: 9px 10px; border-radius: 8px; color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 500; transition: background .15s, color .15s; }
    .side-link svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .side-link:hover { background: var(--accent-light); color: var(--text); }
    .side-link.active { background: var(--accent-light); color: var(--text); }

    main.content { margin-left: 220px; flex: 1; min-width: 0; }
    .page { max-width: 680px; margin: 0 auto; padding: 48px 24px; }
    @media (max-width: 700px) {
      body { flex-direction: column; }
      .sidebar { position: sticky; width: auto; flex-direction: row; align-items: center; border-right: none; border-bottom: 1px solid var(--border); padding: 10px 14px; }
      .sidebar-brand { padding: 0 14px 0 6px; }
      .sidebar-nav { flex-direction: row; gap: 4px; }
      .side-link span { display: none; }
      .side-link { padding: 9px; }
      main.content { margin-left: 0; }
    }

    .page-title { font-size: 22px; font-weight: 600; letter-spacing: -.02em; margin-bottom: 4px; }
    .page-subtitle { font-size: 14px; color: var(--muted); }

    .list-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 24px; }
    .new-btn { flex-shrink: 0; display: inline-flex; align-items: center; gap: 7px; padding: 9px 16px; border-radius: 99px; border: 1px solid var(--text); background: var(--text); color: var(--surface); font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; transition: background .15s; }
    .new-btn:hover { background: #333; }
    .new-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .new-form { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 24px; }
    .nf-title { font-size: 14px; font-weight: 600; margin-bottom: 14px; }
    .nf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .nf-field { display: flex; flex-direction: column; gap: 5px; }
    .nf-field.full { grid-column: 1 / -1; }
    .nf-field label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--hint); }
    .nf-field input, .nf-field select { font-family: var(--sans); font-size: 13px; color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; }
    .nf-field input:focus, .nf-field select:focus { outline: none; border-color: var(--border-strong); }
    .nf-sub { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--hint); margin-bottom: 8px; }
    .nf-goalrow { display: grid; grid-template-columns: 1fr 80px 120px; gap: 10px; }
    .nf-actions { display: flex; gap: 8px; margin-top: 16px; }
    .nf-error { font-size: 12px; color: var(--danger); margin-top: 10px; min-height: 14px; }
    .btn-primary { padding: 9px 18px; border-radius: 99px; border: 1px solid var(--text); background: var(--text); color: var(--surface); font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; transition: background .15s; }
    .btn-primary:hover { background: #333; }
    .btn-ghost { padding: 9px 18px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; }
    .btn-ghost:hover { border-color: var(--border-strong); color: var(--text); }
    @media (max-width: 560px) { .nf-grid { grid-template-columns: 1fr; } .nf-goalrow { grid-template-columns: 1fr; } }

    .filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 18px; }
    .filter-group { display: flex; flex-direction: column; gap: 5px; }
    .filter-group label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--hint); }
    .filters select { font-family: var(--sans); font-size: 13px; color: var(--text); background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; cursor: pointer; }
    .filters select:focus { outline: none; border-color: var(--border-strong); }
    .result-count { font-size: 12px; color: var(--muted); margin-left: auto; padding-bottom: 9px; }

    .demo-note { display: flex; gap: 9px; align-items: flex-start; font-size: 12px; color: var(--warn); background: var(--warn-bg); border: 1px solid var(--warn-border); border-radius: 8px; padding: 11px 13px; line-height: 1.5; margin-bottom: 28px; }

    /* Roster list */
    .roster { display: flex; flex-direction: column; }
    .roster-row { display: flex; align-items: center; gap: 13px; padding: 14px 0; border-top: 1px solid var(--border); cursor: pointer; text-align: left; background: none; border-left: none; border-right: none; border-bottom: none; width: 100%; font-family: var(--sans); transition: opacity .15s; }
    .roster-row:last-child { border-bottom: 1px solid var(--border); }
    .roster-row:hover { opacity: .65; }
    .avatar { width: 36px; height: 36px; border-radius: 99px; background: var(--accent-light); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--muted); flex-shrink: 0; }
    .roster-main { flex: 1; min-width: 0; }
    .roster-name { font-size: 14px; font-weight: 500; }
    .roster-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .roster-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .goal-count { font-size: 12px; color: var(--muted); }
    .roster-arrow { font-size: 12px; color: var(--hint); }

    /* Detail */
    .back-btn { display: inline-flex; align-items: center; gap: 7px; background: none; border: none; color: var(--muted); font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; padding: 0; margin-bottom: 20px; }
    .back-btn:hover { color: var(--text); }
    .detail-head { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
    .detail-head .avatar { width: 48px; height: 48px; font-size: 15px; }
    .detail-name { font-size: 20px; font-weight: 600; letter-spacing: -.01em; }
    .detail-meta { font-size: 13px; color: var(--muted); margin-top: 2px; }

    .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--hint); margin-bottom: 12px; }

    .goal-card { border: 1px solid var(--border); border-radius: 12px; background: var(--surface); padding: 16px 18px; margin-bottom: 12px; }
    .goal-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
    .goal-text { font-size: 14px; line-height: 1.45; flex: 1; }
    .status-pill { flex-shrink: 0; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 99px; }
    .status-met { color: var(--success); background: var(--success-bg); border: 1px solid var(--success-border); }
    .status-track { color: var(--muted); background: var(--accent-light); border: 1px solid var(--border); }
    .status-attention { color: var(--warn); background: var(--warn-bg); border: 1px solid var(--warn-border); }
    .progress-track { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; width: 100%; border-radius: 99px; background: var(--text); transform-origin: left; }
    .progress-fill.met { background: var(--success); }
    .goal-numbers { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-top: 8px; }
    .goal-numbers strong { color: var(--text); font-weight: 600; }
    .history { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px; }
    .history-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); padding: 3px 0; }
    .history-row .hv { color: var(--text); }

    /* Related documents */
    .doc-list { display: flex; flex-direction: column; }
    .doc-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-top: 1px solid var(--border); text-decoration: none; color: inherit; transition: opacity .15s; }
    .doc-row:last-child { border-bottom: 1px solid var(--border); }
    .doc-row:hover { opacity: .7; }
    .doc-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-needs-review { background: var(--warn); }
    .dot-ready { background: var(--success); }
    .dot-approved { background: var(--hint); }
    .doc-summary { font-size: 13px; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .doc-match { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 99px; }
    .doc-match.auto { color: var(--muted); background: var(--accent-light); border: 1px solid var(--border); }
    .doc-match.linked { color: var(--success); background: var(--success-bg); border: 1px solid var(--success-border); }
    .doc-time { font-size: 12px; color: var(--hint); }
    .doc-empty { font-size: 13px; color: var(--hint); padding: 14px 0; line-height: 1.6; }

    /* Floating upload button */
    .fab-upload { position: fixed; top: 18px; right: 26px; z-index: 50; display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; background: var(--text); color: var(--surface); border: none; border-radius: 99px; font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; overflow: hidden; transition: background .15s; }
    .fab-upload:hover { background: #333; }
    .fab-upload svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .fab-upload input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
    .fab-upload.uploading { opacity: .6; pointer-events: none; }
    .fab-status { position: fixed; top: 54px; right: 26px; z-index: 50; font-size: 12px; color: var(--muted); text-align: right; }
    .fab-status.error { color: var(--danger); }
    @media (max-width: 700px) {
      .fab-upload { top: auto; bottom: 20px; right: 20px; }
      .fab-status { top: auto; bottom: 58px; right: 20px; }
    }
  </style>
</head>
<body>
<button class="fab-upload" id="uploadBtn">
  <svg viewBox="0 0 16 16"><path d="M8 11V3M5 6l3-3 3 3"/><path d="M3 13h10"/></svg>
  Upload
  <input type="file" accept="image/*" onchange="handleUpload(this.files[0])">
</button>
<span class="fab-status" id="uploadStatus"></span>

<aside class="sidebar">
  <div class="sidebar-brand"><span class="logo-mark">✦</span><span>Data Co-Pilot</span></div>
  <nav class="sidebar-nav">
    <a class="side-link" href="/">
      <svg viewBox="0 0 20 20"><path d="M3 8.5L10 3l7 5.5"/><path d="M5 7.5V16h10V7.5"/><path d="M8.5 16v-4h3v4"/></svg>
      <span>Home</span>
    </a>
    <a class="side-link" href="/queue.html">
      <svg viewBox="0 0 20 20"><path d="M3 11l2.2-6.2a1 1 0 0 1 .94-.66h7.72a1 1 0 0 1 .94.66L17 11v4.5a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/><path d="M3 11h3.5l1 1.8h5l1-1.8H17"/></svg>
      <span>Review queue</span>
    </a>
    <a class="side-link active" href="/students.html">
      <svg viewBox="0 0 20 20"><circle cx="7" cy="7" r="3"/><path d="M2 17c0-2.8 2.2-5 5-5s5 2.2 5 5"/><path d="M13 4.5a3 3 0 0 1 0 5.4M14 12.2c2 .5 3.5 2.2 3.5 4.3"/></svg>
      <span>Students</span>
    </a>
    <a class="side-link" href="/match.html">
      <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="7"/><circle cx="10" cy="10" r="3"/><path d="M10 1v2.5M10 16.5V19M1 10h2.5M16.5 10H19"/></svg>
      <span>Goal matching</span>
    </a>
  </nav>
</aside>

<main class="content">
<div class="page" id="page"></div>
</main>

<script src="/roster.js"></script>
<script>
  function ini(name) {
    return (name || '?').split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function goalStatus(g) {
    const pct = g.current / g.target;
    // For "fewer is better" goals (prompts), lower current is good; treat reaching/under target as met.
    const lowerIsBetter = /prompt/i.test(g.unit);
    if (lowerIsBetter) {
      if (g.current <= g.target) return { key: 'met', label: 'On target', cls: 'status-met' };
      return { key: 'attention', label: 'Above target', cls: 'status-attention' };
    }
    if (pct >= 1) return { key: 'met', label: 'Target met', cls: 'status-met' };
    if (pct >= 0.6) return { key: 'track', label: 'On track', cls: 'status-track' };
    return { key: 'attention', label: 'Needs attention', cls: 'status-attention' };
  }

  let showForm = false;
  let filterYear = 'all', filterWorker = 'all', sortBy = 'name-asc';

  function uniqueSorted(key) {
    return [...new Set(ROSTER.map(s => s[key]))].sort((a, b) => a.localeCompare(b));
  }

  function visibleStudents() {
    return ROSTER
      .filter(s => (filterYear === 'all' || s.year === filterYear) && (filterWorker === 'all' || s.key_worker === filterWorker))
      .slice()
      .sort((a, b) => sortBy === 'name-desc' ? b.name.localeCompare(a.name) : a.name.localeCompare(b.name));
  }

  function setFilter(kind, val) {
    if (kind === 'year') filterYear = val;
    else if (kind === 'worker') filterWorker = val;
    else if (kind === 'sort') sortBy = val;
    renderList();
  }

  function opt(value, label, selected) {
    return `<option value="${value}"${value === selected ? ' selected' : ''}>${label}</option>`;
  }

  function filtersHtml() {
    const years = uniqueSorted('year');
    const workers = uniqueSorted('key_worker');
    const n = visibleStudents().length;
    return `
      <div class="filters">
        <div class="filter-group">
          <label>Year</label>
          <select onchange="setFilter('year', this.value)">
            ${opt('all', 'All years', filterYear)}${years.map(y => opt(y, y, filterYear)).join('')}
          </select>
        </div>
        <div class="filter-group">
          <label>Key worker</label>
          <select onchange="setFilter('worker', this.value)">
            ${opt('all', 'All key workers', filterWorker)}${workers.map(w => opt(w, w, filterWorker)).join('')}
          </select>
        </div>
        <div class="filter-group">
          <label>Sort</label>
          <select onchange="setFilter('sort', this.value)">
            ${opt('name-asc', 'Name A–Z', sortBy)}${opt('name-desc', 'Name Z–A', sortBy)}
          </select>
        </div>
        <span class="result-count">${n} student${n === 1 ? '' : 's'}</span>
      </div>`;
  }

  function formHtml() {
    return `
      <div class="new-form">
        <div class="nf-title">New student</div>
        <div class="nf-grid">
          <div class="nf-field full"><label>Name</label><input id="nfName" placeholder="e.g. Jordan Miller"></div>
          <div class="nf-field"><label>Year group</label>
            <select id="nfYear"><option>Year 3</option><option selected>Year 4</option><option>Year 5</option><option>Year 6</option></select>
          </div>
          <div class="nf-field"><label>Key worker</label><input id="nfWorker" placeholder="e.g. Miss Clarke"></div>
        </div>
        <div class="nf-sub">First goal (optional)</div>
        <div class="nf-goalrow">
          <div class="nf-field"><label>Goal</label><input id="nfGoal" placeholder="Read 100 sight words independently"></div>
          <div class="nf-field"><label>Target</label><input id="nfTarget" type="number" placeholder="100"></div>
          <div class="nf-field"><label>Unit</label><input id="nfUnit" placeholder="sight words"></div>
        </div>
        <div class="nf-error" id="nfError"></div>
        <div class="nf-actions">
          <button class="btn-primary" onclick="createStudent()">Add student</button>
          <button class="btn-ghost" onclick="toggleForm()">Cancel</button>
        </div>
      </div>`;
  }

  function renderList() {
    const list = visibleStudents();
    const rows = list.length ? list.map(s => `
      <button class="roster-row" onclick="location.hash='${s.id}'">
        <span class="avatar">${ini(s.name)}</span>
        <span class="roster-main">
          <span class="roster-name">${s.name}</span>
          <span class="roster-meta">${s.year} · ${s.key_worker}</span>
        </span>
        <span class="roster-right">
          <span class="goal-count">${s.goals.length} active goal${s.goals.length === 1 ? '' : 's'}</span>
          <span class="roster-arrow">→</span>
        </span>
      </button>`).join('') : '';
    document.getElementById('page').innerHTML = `
      <div class="list-head">
        <div>
          <div class="page-title">Students</div>
          <div class="page-subtitle">Your class roster and each student's active goals.</div>
        </div>
        <button class="new-btn" onclick="toggleForm()"><svg viewBox="0 0 16 16"><path d="M8 3v10M3 8h10"/></svg>New student</button>
      </div>
      <div class="demo-note"><span>⚑</span><span>Demo roster. Sample students plus any you add (saved on this device) until your IEP source is connected.</span></div>
      ${showForm ? formHtml() : ''}
      ${filtersHtml()}
      ${rows ? `<div class="roster">${rows}</div>` : `<div class="empty-state" style="padding:32px 0;color:var(--hint);font-size:14px">No students match these filters.</div>`}`;
    if (showForm) document.getElementById('nfName').focus();
  }

  function toggleForm() {
    showForm = !showForm;
    renderList();
  }

  function slugify(name) {
    return 'custom-' + name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  function createStudent() {
    const name = document.getElementById('nfName').value.trim();
    const err = document.getElementById('nfError');
    if (!name) { err.textContent = 'Please enter a name.'; document.getElementById('nfName').focus(); return; }
    const year = document.getElementById('nfYear').value;
    const worker = document.getElementById('nfWorker').value.trim() || 'Unassigned';
    const goalText = document.getElementById('nfGoal').value.trim();
    const target = parseInt(document.getElementById('nfTarget').value, 10);
    const unit = document.getElementById('nfUnit').value.trim();

    let id = slugify(name);
    if (ROSTER.some(s => s.id === id)) id += '-' + (ROSTER.length + 1);

    const goals = [];
    if (goalText) {
      goals.push({ id: id + '-g1', text: goalText, target: target > 0 ? target : 100, unit: unit || 'units', current: 0, history: [] });
    }
    addStudent({ id, name, year, key_worker: worker, goals });
    showForm = false;
    location.hash = id;
  }

  function renderDetail(s) {
    const goals = s.goals.map(g => {
      const st = goalStatus(g);
      const pct = Math.max(0, Math.min(100, Math.round((g.current / g.target) * 100)));
      const history = (g.history || []).slice().reverse().map(h =>
        `<div class="history-row"><span>${h.date}</span><span class="hv">${h.value} ${g.unit}</span></div>`).join('');
      return `
        <div class="goal-card">
          <div class="goal-top">
            <span class="goal-text">${g.text}</span>
            <span class="status-pill ${st.cls}">${st.label}</span>
          </div>
          <div class="progress-track"><div class="progress-fill ${st.key === 'met' ? 'met' : ''}" style="transform:scaleX(${pct / 100})"></div></div>
          <div class="goal-numbers"><span>Current: <strong>${g.current} ${g.unit}</strong></span><span>Target: ${g.target} ${g.unit}</span></div>
          ${history ? `<div class="history">${history}</div>` : ''}
        </div>`;
    }).join('');
    document.getElementById('page').innerHTML = `
      <button class="back-btn" onclick="location.hash=''">← All students</button>
      <div class="detail-head">
        <span class="avatar">${ini(s.name)}</span>
        <div>
          <div class="detail-name">${s.name}</div>
          <div class="detail-meta">${s.year} · Key worker: ${s.key_worker}</div>
        </div>
      </div>
      <div class="section-label">Active goals (${s.goals.length})</div>
      ${goals}
      <div class="section-label" style="margin-top:32px">Related documents</div>
      <div id="relatedDocs"><div class="doc-empty">Loading…</div></div>`;
    loadRelatedDocs(s);
  }

  function tokens(s) { return (s || '').toLowerCase().replace(/[^a-z0-9\s]/g, ' ').split(/\s+/).filter(Boolean); }

  // A capture's extracted student name matches this roster student
  function matchesStudent(name, student) {
    const en = tokens(name), sn = tokens(student.name);
    if (!en.length || !sn.length || en[0] !== sn[0]) return false;
    if (en.length === 1) return true; // only a first name was written
    const last = en[en.length - 1];
    return sn.slice(1).some(part => part.startsWith(last) || last.startsWith(part));
  }

  function getDocLinks() {
    try { return JSON.parse(localStorage.getItem('dc_doc_links')) || []; } catch (e) { return []; }
  }

  function timeAgo(ts) {
    const diff = Date.now() - new Date(ts);
    const m = Math.floor(diff / 60000);
    if (m < 1) return 'just now';
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h ago`;
    return `${Math.floor(h / 24)}d ago`;
  }

  function dotClass(status) {
    if (status === 'needs_review') return 'dot-needs-review';
    if (status === 'approved') return 'dot-approved';
    return 'dot-ready';
  }

  function docRow(c, linked) {
    const r = c.result_json || {};
    return `
      <a class="doc-row" href="/queue.html">
        <span class="doc-dot ${dotClass(c.status)}"></span>
        <span class="doc-summary">${r.summary || 'Untitled capture'}</span>
        <span class="doc-right">
          <span class="doc-match ${linked ? 'linked' : 'auto'}">${linked ? 'Linked' : 'Auto-matched'}</span>
          <span class="doc-tag" style="font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)">${r.doc_type || '—'}</span>
          <span class="doc-time">${timeAgo(c.created_at)}</span>
        </span>
      </a>`;
  }

  async function loadRelatedDocs(student) {
    const el = document.getElementById('relatedDocs');
    if (!el) return;
    try {
      const res = await fetch('/api/queue');
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'Could not load');
      const links = getDocLinks();
      const related = (data.captures || []).map(c => {
        const isLinked = links.some(l => l.c === c.id && l.s === student.id);
        const isAuto = ((c.result_json && c.result_json.students) || []).some(st => matchesStudent(st.name, student));
        return (isLinked || isAuto) ? { c, linked: isLinked } : null;
      }).filter(Boolean);
      if (!related.length) {
        el.innerHTML = `<div class="doc-empty">No documents matched to ${student.name.split(' ')[0]} yet. Upload a sheet, or link one from the review queue, and it will appear here.</div>`;
        return;
      }
      el.innerHTML = `<div class="doc-list">${related.map(({ c, linked }) => docRow(c, linked)).join('')}</div>`;
    } catch (e) {
      el.innerHTML = `<div class="doc-empty">Couldn't load documents: ${e.message}</div>`;
    }
  }

  function route() {
    const id = location.hash.replace('#', '');
    const student = ROSTER.find(s => s.id === id);
    if (student) renderDetail(student); else renderList();
  }

  window.addEventListener('hashchange', route);

  async function handleUpload(file) {
    if (!file) return;
    const btn = document.getElementById('uploadBtn');
    const status = document.getElementById('uploadStatus');
    btn.classList.add('uploading');
    status.className = 'fab-status';
    status.textContent = 'Uploading…';
    try {
      const fd = new FormData();
      fd.append('image', file);
      const res = await fetch('/api/parse', { method: 'POST', body: fd });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      window.location = '/queue.html';
    } catch(e) {
      status.className = 'fab-status error';
      status.textContent = e.message;
      btn.classList.remove('uploading');
    }
  }

  route();
</script>
</body>
</html>
