<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Co-Pilot — Review Queue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f2ee;
      --surface: #faf8f5;
      --border: #e8e3dc;
      --text: #1a1a1a;
      --muted: #888077;
      --hint: #b8b0a5;
      --accent: #1a1a1a;
      --accent-light: #f0ede8;
      --border-hover: #ccc6be;
      --border-strong: #aaa49d;
      --warn-border: #e4d3b8;
      --success: #2d7a4f;
      --warn: #a06b1a;
      --danger: #c0392b;
      --sans: 'Inter', system-ui, sans-serif;
      --radius: 12px;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

    /* Sidebar */
    .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 14px; }
    .sidebar-brand { display: flex; align-items: center; gap: 9px; padding: 4px 10px 24px; font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
    .logo-mark { font-size: 18px; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 2px; }
    .side-link { display: flex; align-items: center; gap: 11px; padding: 9px 10px; border-radius: 8px; color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 500; transition: background .15s, color .15s; }
    .side-link svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .side-link:hover { background: var(--accent-light); color: var(--text); }
    .side-link.active { background: var(--accent-light); color: var(--text); }
    .sidebar-foot { margin-top: auto; display: flex; flex-direction: column; gap: 10px; }

    /* Floating upload button */
    .fab-upload { position: fixed; top: 18px; right: 26px; z-index: 50; display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; background: var(--text); color: var(--surface); border: none; border-radius: 99px; font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; overflow: hidden; transition: background .15s, transform .15s; }
    .fab-upload:hover { background: #333; }
    .fab-upload svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .fab-upload input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
    .fab-upload.uploading { opacity: .6; pointer-events: none; }
    .fab-status { position: fixed; top: 54px; right: 26px; z-index: 50; font-size: 12px; color: var(--muted); text-align: right; }
    .fab-status.success { color: var(--success); }
    .fab-status.error { color: var(--danger); }
    /* Upload toast */
    .upload-toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px); z-index: 200; display: flex; align-items: center; gap: 10px; padding: 12px 22px; background: var(--text); color: var(--surface); border-radius: 99px; font-family: var(--sans); font-size: 13px; font-weight: 500; opacity: 0; transition: opacity .22s, transform .22s cubic-bezier(0.22,1,0.36,1); pointer-events: none; white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,.18); }
    .upload-toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    .upload-toast.is-error { background: #c0392b; }
    .upload-toast.is-success { background: var(--success); }
    .toast-spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
    .upload-toast.is-error .toast-spinner, .upload-toast.is-success .toast-spinner { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    main.content { margin-left: 220px; flex: 1; min-width: 0; }
    /* Page */
    .page { max-width: 680px; margin: 0 auto; padding: 48px 24px; }

    @media (max-width: 700px) {
      body { flex-direction: column; }
      .sidebar { position: sticky; width: auto; flex-direction: row; align-items: center; border-right: none; border-bottom: 1px solid var(--border); padding: 10px 14px; }
      .sidebar-brand { padding: 0 14px 0 6px; }
      .sidebar-nav { flex-direction: row; gap: 4px; }
      .side-link span { display: none; }
      .side-link { padding: 9px; }
      .sidebar-foot { margin-top: 0; margin-left: auto; flex-direction: row; align-items: center; }
      main.content { margin-left: 0; }
      .fab-upload { top: auto; bottom: 20px; right: 20px; }
      .fab-status { top: auto; bottom: 58px; right: 20px; }
    }
    .page-title { font-size: 22px; font-weight: 600; letter-spacing: -.02em; margin-bottom: 4px; }
    .page-subtitle { font-size: 14px; color: var(--muted); margin-bottom: 32px; }

    /* Filters */
    .filter-row { display: flex; gap: 6px; margin-bottom: 28px; }
    .filter-btn { padding: 6px 14px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: var(--sans); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; }
    .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .filter-btn.active { background: var(--text); color: var(--surface); border-color: var(--text); }

    /* Section label */
    .section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--hint); margin-bottom: 12px; }

    /* Queue rows */
    .queue-list { display: flex; flex-direction: column; }
    .capture-row { border-top: 1px solid var(--border); padding: 16px 0; cursor: pointer; transition: background .1s; }
    .capture-row:last-child { border-bottom: 1px solid var(--border); }
    .row-main { display: flex; align-items: center; gap: 12px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-needs-review { background: var(--warn); }
    .dot-ready { background: var(--success); }
    .dot-approved { background: var(--hint); }
    .row-summary { font-size: 14px; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .doc-tag { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
    .row-time { font-size: 12px; color: var(--hint); }
    .row-chevron { font-size: 11px; color: var(--hint); transition: transform .2s; }
    .capture-row.expanded .row-chevron { transform: rotate(180deg); }

    /* Expanded body */
    .row-body { display: none; padding: 16px 0 8px 19px; }
    .capture-row.expanded .row-body { display: block; }
    .row-summary-text { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 16px; }
    .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-bottom: 16px; }
    .detail-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
    .detail-key { font-size: 10px; color: var(--hint); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .05em; }
    .detail-val { font-size: 13px; font-weight: 500; }
    .student-list { display: flex; flex-direction: column; margin-bottom: 16px; }
    .student-row { display: flex; align-items: flex-start; gap: 10px; padding: 12px 0; border-top: 1px solid var(--border); }
    .student-row:last-child { border-bottom: 1px solid var(--border); }
    .avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--accent-light); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; color: var(--muted); flex-shrink: 0; margin-top: 1px; }
    .student-main { flex: 1; min-width: 0; }
    .student-head { display: flex; align-items: center; gap: 10px; }
    .student-name { font-size: 13px; font-weight: 500; flex: 1; }
    .student-score { font-size: 13px; font-weight: 600; color: var(--text); }
    .student-goal { font-size: 12px; color: var(--muted); line-height: 1.5; margin-top: 4px; display: flex; gap: 7px; align-items: baseline; }
    .student-goal.missing { color: var(--warn); }
    .goal-tag { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); background: var(--accent-light); border-radius: 6px; padding: 2px 5px; flex-shrink: 0; }
    .goal-tag.missing { color: var(--warn); background: var(--warn-bg); }
    .student-progress { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .student-progress strong { color: var(--text); font-weight: 600; }
    .student-note { font-size: 12px; color: var(--muted); line-height: 1.5; margin-top: 3px; font-style: italic; }
    .student-entries { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
    .student-entry { display: flex; align-items: baseline; gap: 8px; font-size: 12px; color: var(--muted); }
    .entry-score { font-size: 12px; font-weight: 600; color: var(--text); background: var(--accent-light); border-radius: 6px; padding: 1px 7px; flex-shrink: 0; position: relative; cursor: default; }
    .entry-score[data-date]:hover::after { content: attr(data-date); position: absolute; bottom: calc(100% + 5px); left: 50%; transform: translateX(-50%); background: var(--text); color: var(--surface); font-size: 11px; font-weight: 400; white-space: nowrap; padding: 4px 8px; border-radius: 6px; pointer-events: none; z-index: 10; }
    .entry-score[data-date]:hover::before { content: ''; position: absolute; bottom: calc(100% + 1px); left: 50%; transform: translateX(-50%); border: 4px solid transparent; border-top-color: var(--text); pointer-events: none; z-index: 10; }
    .entry-note { font-style: italic; }
    .flag-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .flag-card { border: 1px solid #e4d3b8; background: #fdf9f1; border-radius: 8px; padding: 11px 12px; transition: all .15s; }
    .flag-card.resolved { border-color: #bfe0cc; background: #f3faf5; }
    .flag-q { font-size: 12px; color: var(--warn); line-height: 1.5; display: flex; gap: 7px; margin-bottom: 8px; }
    .flag-card.resolved .flag-q { color: var(--success); }
    .flag-input-row { display: flex; gap: 6px; }
    .flag-resolve { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; font-family: var(--sans); font-size: 13px; color: var(--text); }
    .flag-resolve:focus { outline: none; border-color: var(--border-strong); }
    .flag-add-btn { flex-shrink: 0; padding: 7px 16px; border-radius: 6px; border: 1px solid var(--text); background: var(--text); color: var(--surface); font-family: var(--sans); font-size: 12px; font-weight: 500; cursor: pointer; transition: background .15s; }
    .flag-add-btn:hover { background: #333; }
    .flag-add-btn:disabled { opacity: .6; cursor: default; }
    .flag-resolved-msg { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--success); }
    .flag-resolved-msg span { flex: 1; }
    .flag-resolved-msg strong { font-weight: 600; color: var(--text); }
    .flag-edit-btn { flex-shrink: 0; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: var(--sans); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; }
    .flag-edit-btn:hover { border-color: var(--border-strong); color: var(--text); }
    .note-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-family: var(--sans); font-size: 13px; color: var(--text); resize: vertical; min-height: 64px; margin-bottom: 12px; }
    .note-input:focus { outline: none; border-color: var(--border-strong); }
    .link-row { margin-top: 16px; }
    .linked-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .linked-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--success); background: var(--success-bg); border: 1px solid var(--success-border); border-radius: 99px; padding: 4px 6px 4px 11px; }
    .linked-chip button { background: none; border: none; color: var(--success); cursor: pointer; font-size: 14px; line-height: 1; padding: 0 2px; border-radius: 99px; }
    .linked-chip button:hover { color: var(--danger); }
    .link-select { font-family: var(--sans); font-size: 12px; color: var(--muted); background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; cursor: pointer; }
    .link-select:focus { outline: none; border-color: var(--border-strong); }
    .card-actions { display: flex; gap: 8px; margin-top: 16px; }
    .card-btn { padding: 8px 16px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: var(--sans); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; }
    .card-btn:hover { border-color: var(--border-strong); color: var(--text); }
    .card-btn.approve { background: var(--text); color: var(--surface); border-color: var(--text); }
    .card-btn.approve:hover { background: #333; }
    .card-btn.flag { color: var(--warn); border-color: var(--warn-border); }

    /* States */
    .loading-state { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 60px; color: var(--muted); font-size: 14px; }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--hint); font-size: 14px; line-height: 1.7; }
    .empty-state a { color: var(--text); }

    /* Document viewer modal */
    .dv-backdrop { position: fixed; inset: 0; z-index: 400; background: rgba(10,10,10,.55); display: flex; align-items: center; justify-content: center; padding: 16px; opacity: 0; transition: opacity .2s; pointer-events: none; }
    .dv-backdrop.open { opacity: 1; pointer-events: all; }
    .dv-modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 1100px; height: 88vh; display: flex; flex-direction: column; overflow: hidden; transform: translateY(12px); transition: transform .22s cubic-bezier(0.22,1,0.36,1); }
    .dv-backdrop.open .dv-modal { transform: translateY(0); }
    .dv-header { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .dv-title { font-size: 14px; font-weight: 600; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dv-badge { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); background: var(--accent-light); border-radius: 6px; padding: 3px 8px; flex-shrink: 0; }
    .dv-close { width: 30px; height: 30px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; line-height: 1; }
    .dv-close:hover { border-color: var(--border-strong); color: var(--text); }
    .dv-body { flex: 1; display: flex; overflow: hidden; min-height: 0; }
    /* Image panel */
    .dv-image-panel { flex: 0 0 60%; border-right: 1px solid var(--border); background: #e8e3dc; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .dv-img-wrap { position: relative; display: inline-flex; }
    .dv-img-wrap img { display: block; max-width: 100%; max-height: 82vh; object-fit: contain; border-radius: 4px; }
    .dv-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .dv-no-image { text-align: center; color: var(--hint); font-size: 13px; line-height: 1.8; padding: 40px; }
    .dv-no-image svg { width: 48px; height: 48px; stroke: var(--border-strong); fill: none; stroke-width: 1.2; margin-bottom: 16px; }
    /* Fields panel */
    .dv-fields-panel { flex: 1; overflow-y: auto; padding: 0; display: flex; flex-direction: column; }
    .dv-doc-summary { padding: 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .dv-doc-type { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--hint); margin-bottom: 10px; }
    .dv-doc-title { font-size: 15px; font-weight: 600; line-height: 1.35; letter-spacing: -.01em; margin-bottom: 12px; }
    .dv-doc-meta { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .dv-meta-row { display: flex; gap: 8px; font-size: 12px; }
    .dv-meta-key { color: var(--hint); width: 80px; flex-shrink: 0; }
    .dv-meta-val { color: var(--text); font-weight: 500; }
    .dv-doc-narrative { font-size: 13px; color: var(--muted); line-height: 1.6; border-top: 1px solid var(--border); padding-top: 12px; }
    .dv-conf { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 99px; margin-top: 10px; }
    .dv-conf-high { color: var(--success); background: var(--success-bg); border: 1px solid var(--success-border); }
    .dv-conf-low { color: var(--warn); background: var(--warn-bg); border: 1px solid var(--warn-border); }
    .dv-fields-scroll { flex: 1; overflow-y: auto; padding: 20px; }
    .dv-fields-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--hint); margin-bottom: 14px; }
    .dv-field { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: background .12s; margin-bottom: 4px; border: 1.5px solid transparent; }
    .dv-field:hover, .dv-field.hovered { background: var(--accent-light); }
    .dv-field.active { border-color: currentColor; background: var(--accent-light); }
    .dv-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
    .dv-field-body { flex: 1; min-width: 0; }
    .dv-field-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--hint); margin-bottom: 2px; }
    .dv-field-value { font-size: 13px; color: var(--text); line-height: 1.45; }
    .dv-field.no-bbox { opacity: .6; cursor: default; }
    .dv-section-sep { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--hint); margin: 14px 0 8px; padding-top: 14px; border-top: 1px solid var(--border); }

    /* Inline log-to-record section */
    .log-section { margin-top: 20px; }
    .log-block { border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; background: var(--surface); }
    .log-block-name { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    .log-match-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; background: var(--accent-light); border-radius: 6px; padding: 2px 7px; margin-bottom: 10px; color: var(--muted); }
    .log-match-badge.good { color: var(--success); }
    .log-match-badge.weak { color: var(--warn); }
    .log-field { margin-bottom: 10px; }
    .log-field-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--hint); margin-bottom: 5px; }
    .log-select, .log-input { width: 100%; font-family: var(--sans); font-size: 12px; color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; }
    .log-select:focus, .log-input:focus { outline: none; border-color: var(--border-strong); }
    .log-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .log-actions { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
    .log-btn { padding: 8px 18px; border-radius: 99px; border: 1px solid var(--text); background: var(--text); color: var(--surface); font-family: var(--sans); font-size: 12px; font-weight: 500; cursor: pointer; transition: background .15s; }
    .log-btn:hover { background: #333; }
    .log-btn:disabled { opacity: .5; cursor: default; }
    .log-ok { font-size: 12px; color: var(--success); display: none; }

    @media (max-width: 700px) {
      .dv-body { flex-direction: column; }
      .dv-image-panel { flex: 0 0 50%; border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>
<button class="fab-upload" id="uploadBtn">
  <svg viewBox="0 0 16 16"><path d="M8 11V3M5 6l3-3 3 3"/><path d="M3 13h10"/></svg>
  Upload
  <input type="file" accept="image/*" multiple onchange="handleUpload(this.files)">
</button>
<span class="fab-status" id="uploadStatus"></span>

<aside class="sidebar">
  <div class="sidebar-brand"><span class="logo-mark">✦</span><span>Data Co-Pilot</span></div>
  <nav class="sidebar-nav">
    <a class="side-link" href="/">
      <svg viewBox="0 0 20 20"><path d="M3 8.5L10 3l7 5.5"/><path d="M5 7.5V16h10V7.5"/><path d="M8.5 16v-4h3v4"/></svg>
      <span>Home</span>
    </a>
    <a class="side-link active" href="/queue.html">
      <svg viewBox="0 0 20 20"><path d="M3 11l2.2-6.2a1 1 0 0 1 .94-.66h7.72a1 1 0 0 1 .94.66L17 11v4.5a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/><path d="M3 11h3.5l1 1.8h5l1-1.8H17"/></svg>
      <span>Review queue</span>
    </a>
    <a class="side-link" href="/students.html">
      <svg viewBox="0 0 20 20"><circle cx="7" cy="7" r="3"/><path d="M2 17c0-2.8 2.2-5 5-5s5 2.2 5 5"/><path d="M13 4.5a3 3 0 0 1 0 5.4M14 12.2c2 .5 3.5 2.2 3.5 4.3"/></svg>
      <span>Students</span>
    </a>
    <a class="side-link" href="/match.html">
      <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="7"/><circle cx="10" cy="10" r="3"/><path d="M10 1v2.5M10 16.5V19M1 10h2.5M16.5 10H19"/></svg>
      <span>Goal matching</span>
    </a>
    <a class="side-link" href="/overview.html">
      <svg viewBox="0 0 20 20"><rect x="3" y="3" width="6" height="6" rx="1"/><rect x="11" y="3" width="6" height="6" rx="1"/><rect x="3" y="11" width="6" height="6" rx="1"/><rect x="11" y="11" width="6" height="6" rx="1"/></svg>
      <span>Class overview</span>
    </a>
  </nav>
</aside>

<main class="content">
<div class="page">
  <div class="page-title">Review queue</div>
  <div class="page-subtitle">Captured documents waiting for your review.</div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('needs_review', this)">Needs review</button>
    <button class="filter-btn" onclick="setFilter('ready', this)">Ready</button>
    <button class="filter-btn" onclick="setFilter('approved', this)">Approved</button>
  </div>

  <div id="queueList">
    <div class="loading-state"><div class="spinner"></div>Loading…</div>
  </div>
</div>
</main>

<script src="/roster.js"></script>
<script>
  let allCaptures = [];
  let activeFilter = 'all';

  async function loadQueue() {
    try {
      const res = await fetch('/api/queue');
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      allCaptures = data.captures || [];
      renderQueue();
    } catch(e) {
      document.getElementById('queueList').innerHTML = `<div class="empty-state" style="color:var(--danger)">${e.message}</div>`;
    }
  }

  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderQueue();
  }

  function renderQueue() {
    const list = document.getElementById('queueList');
    const filtered = activeFilter === 'all' ? allCaptures : allCaptures.filter(c => c.status === activeFilter);
    if (!filtered.length) {
      list.innerHTML = `<div class="empty-state">No captures yet${activeFilter !== 'all' ? ' with this status' : ''}.</div>`;
      return;
    }
    list.innerHTML = `<div class="queue-list">${filtered.map(c => cardHtml(c)).join('')}</div>`;
    filtered.forEach(c => {
      document.getElementById(`card-${c.id}`).addEventListener('click', e => {
        if (e.target.closest('button, textarea, input, select, .link-row, .linked-chips, .flag-block, .log-section')) return;
        toggleCard(c.id);
      });
    });
  }

  function ini(name) {
    return (name || '?').split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  // --- Inline log-to-record helpers ---
  function tokenOverlap(a, b) {
    const ta = new Set((a || '').toLowerCase().split(/\W+/).filter(x => x.length > 2));
    const tb = new Set((b || '').toLowerCase().split(/\W+/).filter(x => x.length > 2));
    let n = 0;
    for (const t of ta) if (tb.has(t)) n++;
    return n / Math.max(ta.size, tb.size, 1);
  }

  function fuzzyMatchStudent(name) {
    if (!name || !window.ROSTER?.length) return null;
    let best = null, bestScore = 0;
    for (const s of window.ROSTER) {
      const score = tokenOverlap(name, s.name);
      if (score > bestScore) { bestScore = score; best = s; }
    }
    return bestScore > 0 ? { student: best, score: bestScore } : null;
  }

  function rankGoals(student, extractedText) {
    if (!student?.goals?.length) return [];
    if (!extractedText) return student.goals;
    return [...student.goals].sort((a, b) =>
      tokenOverlap(b.text || '', extractedText) - tokenOverlap(a.text || '', extractedText)
    );
  }

  function goalOptionsHtml(student, extractedText) {
    if (!student) return '<option value="">— select student first —</option>';
    if (!student.goals?.length) return '<option value="">— no goals recorded —</option>';
    return rankGoals(student, extractedText).map(g =>
      `<option value="${g.id}">${(g.text || '').slice(0, 90)}</option>`
    ).join('');
  }

  function buildLogSection(c) {
    const r = c.result_json || {};
    const students = r.students || [];
    if (!students.length) return '';

    let html = `<div class="log-section"><div class="section-label">Log to student records</div>`;

    students.forEach((s, si) => {
      const matchResult = fuzzyMatchStudent(s.name);
      const matchedStudent = matchResult?.student;
      const confidence = matchResult?.score || 0;
      const matchClass = confidence >= 0.67 ? 'good' : 'weak';
      const extractedText = (s.goal || '') + ' ' + (s.goal_progress || '');
      const dateVal = r.date ? r.date.replace(/(\d{2})[\/\-](\d{2})[\/\-](\d{4})/, '$3-$2-$1').replace(/(\d{4})[\/\-](\d{2})[\/\-](\d{2})/, '$1-$2-$3') : '2026-06-25';

      const rosterOptions = (window.ROSTER || []).map(rs =>
        `<option value="${rs.id}"${matchedStudent?.id === rs.id ? ' selected' : ''}>${rs.name}</option>`
      ).join('');

      html += `
        <div class="log-block" id="log-block-${c.id}-${si}">
          <div class="log-block-name">${s.name || 'Student ' + (si + 1)}</div>
          ${confidence > 0 ? `<div class="log-match-badge ${matchClass}">Auto-matched: ${matchedStudent.name} · ${Math.round(confidence * 100)}%</div>` : ''}
          <div class="log-field">
            <div class="log-field-label">Student in records</div>
            <select class="log-select" id="log-student-${c.id}-${si}"
              onchange="updateLogGoals('${c.id}',${si},this.value,${JSON.stringify(extractedText)})">
              <option value="">— select student —</option>
              ${rosterOptions}
            </select>
          </div>
          <div class="log-field">
            <div class="log-field-label">Goal</div>
            <select class="log-select" id="log-goal-${c.id}-${si}">
              ${goalOptionsHtml(matchedStudent, extractedText)}
            </select>
          </div>
          <div class="log-row">
            <div class="log-field">
              <div class="log-field-label">Score / progress</div>
              <input class="log-input" id="log-score-${c.id}-${si}" type="text"
                value="${(s.score || s.goal_progress || '').replace(/"/g, '&quot;')}"
                placeholder="e.g. 14/20">
            </div>
            <div class="log-field">
              <div class="log-field-label">Date</div>
              <input class="log-input" id="log-date-${c.id}-${si}" type="date" value="${dateVal}">
            </div>
          </div>
          <div class="log-field">
            <div class="log-field-label">Note</div>
            <input class="log-input" id="log-note-${c.id}-${si}" type="text"
              value="${(s.note || '').replace(/"/g, '&quot;')}"
              placeholder="Optional observation…">
          </div>
          <div class="log-actions">
            <button class="log-btn" id="log-btn-${c.id}-${si}" onclick="logProgress('${c.id}',${si})">Log progress</button>
            <span class="log-ok" id="log-ok-${c.id}-${si}">✓ Progress logged</span>
          </div>
        </div>`;
    });

    html += `</div>`;
    return html;
  }

  function updateLogGoals(captureId, si, studentId, extractedText) {
    const student = (window.ROSTER || []).find(s => s.id === studentId);
    const sel = document.getElementById(`log-goal-${captureId}-${si}`);
    if (sel) sel.innerHTML = goalOptionsHtml(student, extractedText);
  }

  function logProgress(captureId, si) {
    const studentId = document.getElementById(`log-student-${captureId}-${si}`)?.value;
    const goalId = document.getElementById(`log-goal-${captureId}-${si}`)?.value;
    const score = document.getElementById(`log-score-${captureId}-${si}`)?.value?.trim() || '';
    const date = document.getElementById(`log-date-${captureId}-${si}`)?.value || '';
    const note = document.getElementById(`log-note-${captureId}-${si}`)?.value?.trim() || '';

    if (!studentId) { alert('Please select a student.'); return; }
    if (!goalId) { alert('Please select a goal.'); return; }

    const student = (window.ROSTER || []).find(s => s.id === studentId);
    const goal = student?.goals?.find(g => g.id === goalId);

    // Persist to localStorage log
    const logs = JSON.parse(localStorage.getItem('dc_progress_log') || '[]');
    logs.push({ captureId, studentId, goalId, goalText: goal?.text || '', score, date, note, loggedAt: new Date().toISOString() });
    localStorage.setItem('dc_progress_log', JSON.stringify(logs));

    // Update ROSTER in memory so students.html picks it up in this session
    if (goal && score) {
      const num = parseFloat(score);
      if (!isNaN(num)) {
        goal.current = num;
        if (!goal.history) goal.history = [];
        goal.history.push({ date, value: num });
      }
    }

    const btn = document.getElementById(`log-btn-${captureId}-${si}`);
    if (btn) { btn.textContent = 'Logged ✓'; btn.disabled = true; }
    const ok = document.getElementById(`log-ok-${captureId}-${si}`);
    if (ok) ok.style.display = 'inline';
  }

  function timeAgo(ts) {
    const diff = Date.now() - new Date(ts);
    const m = Math.floor(diff / 60000);
    if (m < 1) return 'just now';
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h ago`;
    return `${Math.floor(h / 24)}d ago`;
  }

  function dotClass(status) {
    if (status === 'needs_review') return 'dot-needs-review';
    if (status === 'approved') return 'dot-approved';
    return 'dot-ready';
  }

  // --- Document ↔ student links (shared with the Students page via localStorage) ---
  function getDocLinks() { try { return JSON.parse(localStorage.getItem('dc_doc_links')) || []; } catch (e) { return []; } }
  function saveDocLinks(l) { localStorage.setItem('dc_doc_links', JSON.stringify(l)); }
  function studentName(id) { const s = (window.ROSTER || []).find(x => x.id === id); return s ? s.name : id; }
  function linkedChips(captureId) {
    const links = getDocLinks().filter(l => l.c === captureId);
    if (!links.length) return '<span style="font-size:12px;color:var(--hint)">None yet</span>';
    return links.map(l => `<span class="linked-chip">${studentName(l.s)}<button title="Unlink" onclick="unlinkDoc('${captureId}','${l.s}')">×</button></span>`).join('');
  }
  function linkDoc(captureId, studentId) {
    if (!studentId) return;
    const links = getDocLinks();
    if (!links.some(l => l.c === captureId && l.s === studentId)) { links.push({ c: captureId, s: studentId }); saveDocLinks(links); }
    document.getElementById('linked-' + captureId).innerHTML = linkedChips(captureId);
  }
  function unlinkDoc(captureId, studentId) {
    saveDocLinks(getDocLinks().filter(l => !(l.c === captureId && l.s === studentId)));
    document.getElementById('linked-' + captureId).innerHTML = linkedChips(captureId);
  }

  function flagInputType(flag) {
    return /\b(date|year|when|day|month|dob|d\.o\.b|birth|deadline|due)\b/i.test(flag) ? 'date' : 'text';
  }

  function flagInputRow(id, index, flagEnc, value, flagText, btnLabel) {
    const type = flagInputType(flagText);
    const v = (value || '').replace(/"/g, '&quot;');
    const placeholder = type === 'date' ? '' : 'Add the missing info…';
    return `
      <div class="flag-input-row">
        <input class="flag-resolve" type="${type}" id="flagres-${id}-${index}" data-flag="${flagEnc}"
          placeholder="${placeholder}" value="${v}"
          onkeydown="if(event.key==='Enter'){event.preventDefault();saveResolution('${id}',${index})}">
        <button class="flag-add-btn" onclick="saveResolution('${id}',${index})">${btnLabel}</button>
      </div>`;
  }

  function cardHtml(c) {
    const r = c.result_json || {};
    const students = r.students || [];
    const flags = r.flags || [];
    const meta = [['Date', r.date], ['Teacher', r.teacher], ['Subject', r.subject], ['Class', r.class_group]].filter(([, v]) => v);

    let body = '';
    if (r.summary) body += `<div class="row-summary-text">${r.summary}</div>`;

    if (meta.length) {
      body += `<div class="section-label">Details</div><div class="detail-grid">`;
      for (const [k, v] of meta) body += `<div class="detail-item"><div class="detail-key">${k}</div><div class="detail-val">${v}</div></div>`;
      body += `</div>`;
    }

    if (students.length) {
      // Group by student name + goal so repeated date-entries collapse into one row
      const groups = [];
      const keyMap = {};
      for (const s of students) {
        const key = (s.name || '') + '|' + (s.goal || '');
        if (keyMap[key] !== undefined) {
          groups[keyMap[key]].entries.push(s);
        } else {
          keyMap[key] = groups.length;
          groups.push({ name: s.name, goal: s.goal, entries: [s] });
        }
      }
      const uniqueStudents = new Set(groups.map(g => g.name)).size;
      body += `<div class="section-label">Students (${uniqueStudents})</div><div class="student-list">`;
      for (const g of groups) {
        const multi = g.entries.length > 1;
        const first = g.entries[0];
        const goalLine = g.goal
          ? `<div class="student-goal"><span class="goal-tag">Goal</span>${g.goal}</div>`
          : (first.score || first.goal_progress)
            ? `<div class="student-goal missing"><span class="goal-tag missing">No goal</span>Score recorded without a goal to interpret it against</div>`
            : '';

        let entriesHtml = '';
        if (multi) {
          entriesHtml = `<div class="student-entries">`;
          for (const e of g.entries) {
            const val = e.score || e.goal_progress || '';
            const date = e.date || r.date || '';
            const noteHtml = e.note ? `<span class="entry-note">${e.note}</span>` : '';
            const dateAttr = date ? ` data-date="${date}"` : '';
            entriesHtml += `<div class="student-entry">${val ? `<span class="entry-score"${dateAttr}>${val}</span>` : ''}${noteHtml}</div>`;
          }
          entriesHtml += `</div>`;
        } else {
          const progressLine = first.goal_progress ? `<div class="student-progress">Progress: <strong>${first.goal_progress}</strong></div>` : '';
          const noteLine = first.note ? `<div class="student-note">${first.note}</div>` : '';
          entriesHtml = progressLine + noteLine;
        }

        body += `
          <div class="student-row">
            <div class="avatar">${ini(g.name)}</div>
            <div class="student-main">
              <div class="student-head">
                <span class="student-name">${g.name}</span>
                ${!multi && first.score ? `<span class="student-score">${first.score}</span>` : ''}
              </div>
              ${goalLine}${entriesHtml}
            </div>
          </div>`;
      }
      body += `</div>`;
    }

    if (flags.length) {
      const resolutions = (r.flag_resolutions || []);
      body += `<div class="section-label" style="margin-top:16px">Needs your input (${flags.length})</div><div class="flag-list">`;
      flags.forEach((f, i) => {
        const resolved = resolutions.find(x => x.flag === f);
        body += `
          <div class="flag-card ${resolved ? 'resolved' : ''}" id="flagcard-${c.id}-${i}">
            <div class="flag-q"><span>${resolved ? '✓' : '↳'}</span><span>${f}</span></div>
            ${flagInputRow(c.id, i, encodeURIComponent(f), resolved ? resolved.resolution : '', f, resolved ? 'Update' : 'Add')}
          </div>`;
      });
      body += `</div>`;
    }

    body += buildLogSection(c);

    body += `
      <div class="link-row">
        <div class="section-label">Linked students</div>
        <div class="linked-chips" id="linked-${c.id}">${linkedChips(c.id)}</div>
        <select class="link-select" onchange="linkDoc('${c.id}', this.value); this.value='';">
          <option value="">+ Link a student…</option>
          ${(window.ROSTER || []).map(s => `<option value="${s.id}">${s.name}</option>`).join('')}
        </select>
      </div>
      <div class="section-label" style="margin-top:16px">Teacher note</div>
      <textarea class="note-input" id="note-${c.id}" placeholder="Add a note before approving…">${c.teacher_note || ''}</textarea>
      <div class="card-actions">
        <button class="card-btn approve" onclick="updateCapture('${c.id}', 'approved')">Approve</button>
        <button class="card-btn flag" onclick="updateCapture('${c.id}', 'needs_review')">Flag for review</button>
        <button class="card-btn" onclick="updateCapture('${c.id}', 'ready')">Mark ready</button>
        <button class="card-btn" onclick="openDocViewer('${c.id}')">View document</button>
      </div>`;

    return `
      <div class="capture-row" id="card-${c.id}">
        <div class="row-main">
          <span class="status-dot ${dotClass(c.status)}"></span>
          <span class="row-summary">${r.summary || 'Untitled capture'}</span>
          <div class="row-right">
            <span class="doc-tag">${r.doc_type || '—'}</span>
            <span class="row-time">${timeAgo(c.created_at)}</span>
            <span class="row-chevron">▾</span>
          </div>
        </div>
        <div class="row-body">${body}</div>
      </div>`;
  }

  function toggleCard(id) {
    document.getElementById(`card-${id}`).classList.toggle('expanded');
  }

  async function saveResolution(id, index) {
    const input = document.getElementById(`flagres-${id}-${index}`);
    const val = input.value.trim();
    if (!val) { input.focus(); return; }

    const capture = allCaptures.find(c => c.id === id);
    if (!capture) return;
    const flag = decodeURIComponent(input.dataset.flag);
    const result_json = { ...capture.result_json };
    const resolutions = (result_json.flag_resolutions || []).filter(x => x.flag !== flag);
    resolutions.push({ flag, resolution: val });
    result_json.flag_resolutions = resolutions;

    const btn = input.nextElementSibling;
    const prevLabel = btn.textContent;
    btn.textContent = 'Saving…';
    btn.disabled = true;
    try {
      await fetch('/api/update', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, status: capture.status, teacher_note: document.getElementById(`note-${id}`)?.value || capture.teacher_note, result_json })
      });
      capture.result_json = result_json; // keep local state in sync without re-rendering
      const card = document.getElementById(`flagcard-${id}-${index}`);
      card.classList.add('resolved');
      card.innerHTML = `
        <div class="flag-q"><span>✓</span><span>${flag}</span></div>
        <div class="flag-resolved-msg">
          <span>Information updated — <strong>"${val.replace(/"/g, '&quot;')}"</strong></span>
          <button class="flag-edit-btn" onclick="editResolution('${id}',${index},'${input.dataset.flag}')">Edit</button>
        </div>`;
    } catch(e) {
      btn.textContent = prevLabel;
      btn.disabled = false;
      alert('Save failed: ' + e.message);
    }
  }

  function editResolution(id, index, flagEnc) {
    const capture = allCaptures.find(c => c.id === id);
    const flag = decodeURIComponent(flagEnc);
    const resolved = (capture?.result_json?.flag_resolutions || []).find(x => x.flag === flag);
    const card = document.getElementById(`flagcard-${id}-${index}`);
    card.innerHTML = `
      <div class="flag-q"><span>↳</span><span>${flag}</span></div>
      ${flagInputRow(id, index, flagEnc, resolved ? resolved.resolution : '', flag, 'Update')}`;
    document.getElementById(`flagres-${id}-${index}`).focus();
  }

  async function updateCapture(id, status) {
    const note = document.getElementById(`note-${id}`)?.value || '';

    // Collect any flag resolutions the teacher filled in
    const capture = allCaptures.find(c => c.id === id);
    const result_json = capture ? { ...capture.result_json } : undefined;
    if (result_json) {
      const resolutions = [];
      document.querySelectorAll(`[id^="flagres-${id}-"]`).forEach(inp => {
        const val = inp.value.trim();
        if (val) resolutions.push({ flag: decodeURIComponent(inp.dataset.flag), resolution: val });
      });
      result_json.flag_resolutions = resolutions;
    }

    try {
      await fetch('/api/update', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, status, teacher_note: note, result_json })
      });
      await loadQueue();
    } catch(e) {
      alert('Update failed: ' + e.message);
    }
  }

  function showToast(msg, type) {
    let t = document.getElementById('uploadToast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'uploadToast';
      t.innerHTML = '<div class="toast-spinner"></div><span id="toastMsg"></span>';
      document.body.appendChild(t);
    }
    t.className = 'upload-toast' + (type ? ' is-' + type : '');
    document.getElementById('toastMsg').textContent = msg;
    requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('visible')));
  }
  function hideToast(delay) {
    setTimeout(() => {
      const t = document.getElementById('uploadToast');
      if (t) t.classList.remove('visible');
    }, delay || 0);
  }

  function createThumbnail(file) {
    return new Promise(resolve => {
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        const MAX = 1200;
        const scale = Math.min(1, MAX / Math.max(img.width, img.height));
        const c = document.createElement('canvas');
        c.width = Math.round(img.width * scale);
        c.height = Math.round(img.height * scale);
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        URL.revokeObjectURL(url);
        resolve(c.toDataURL('image/jpeg', 0.82));
      };
      img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
      img.src = url;
    });
  }

  async function uploadOne(file, index, total) {
    showToast(total > 1 ? `Uploading ${index + 1} of ${total}…` : 'Uploading document…');
    const thumb = await createThumbnail(file);
    const fd = new FormData();
    fd.append('image', file);
    const res = await fetch('/api/parse', { method: 'POST', body: fd });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    if (thumb && data.id) { try { localStorage.setItem(`dc_img_${data.id}`, thumb); } catch(e) {} }
    return data;
  }

  async function handleUpload(files) {
    const list = files instanceof FileList ? [...files].filter(f => f.type.startsWith('image/')) : (files ? [files] : []);
    if (!list.length) return;
    document.getElementById('uploadBtn').classList.add('uploading');
    let errors = 0;
    for (let i = 0; i < list.length; i++) {
      try { await uploadOne(list[i], i, list.length); }
      catch(e) { errors++; showToast(`File ${i + 1}: ${e.message}`, 'error'); await new Promise(r => setTimeout(r, 2000)); }
    }
    await loadQueue();
    if (errors === 0) { showToast(list.length > 1 ? `${list.length} documents added ✓` : 'Added to review queue ✓', 'success'); hideToast(2500); }
    else { showToast(`${list.length - errors} uploaded, ${errors} failed`, 'error'); hideToast(4000); }
    document.getElementById('uploadBtn').classList.remove('uploading');
  }

  loadQueue();

  // ── Document viewer ──────────────────────────────────────────────────────────
  const HIGHLIGHT_COLORS = [
    '#2563eb','#16a34a','#d97706','#dc2626','#7c3aed',
    '#0891b2','#be185d','#ea580c','#65a30d','#6366f1'
  ];

  function buildHighlights(r) {
    // Use Gemini's highlights array if present, otherwise synthesise from result_json
    if (r.highlights && r.highlights.length) return r.highlights;
    const out = [];
    if (r.date)        out.push({ label: 'Date',    value: r.date });
    if (r.teacher)     out.push({ label: 'Teacher', value: r.teacher });
    if (r.subject)     out.push({ label: 'Subject', value: r.subject });
    if (r.class_group) out.push({ label: 'Class',   value: r.class_group });
    (r.students || []).forEach(s => {
      if (s.name)          out.push({ label: `${s.name} — name`,     value: s.name });
      if (s.score)         out.push({ label: `${s.name} — score`,    value: s.score });
      if (s.goal)          out.push({ label: `${s.name} — goal`,     value: s.goal });
      if (s.goal_progress) out.push({ label: `${s.name} — progress`, value: s.goal_progress });
      if (s.note)          out.push({ label: `${s.name} — note`,     value: s.note });
    });
    if (r.free_text) out.push({ label: 'Free text', value: r.free_text.slice(0, 80) + (r.free_text.length > 80 ? '…' : '') });
    return out;
  }

  function openDocViewer(captureId) {
    const capture = allCaptures.find(c => c.id === captureId);
    if (!capture) return;
    const r = capture.result_json || {};
    const highlights = buildHighlights(r);
    const imgSrc = (() => { try { return localStorage.getItem(`dc_img_${captureId}`); } catch(e) { return null; } })();

    const existing = document.getElementById('dvBackdrop');
    if (existing) existing.remove();

    const backdrop = document.createElement('div');
    backdrop.id = 'dvBackdrop';
    backdrop.className = 'dv-backdrop';
    // Build summary meta rows
    const students = (r.students || []);
    const studentNames = [...new Set(students.map(s => s.name).filter(Boolean))].join(', ') || null;
    const metaRows = [
      r.doc_type   && ['Document type', r.doc_type.replace(/_/g, ' ')],
      studentNames && ['Student(s)', studentNames],
      r.date       && ['Date recorded', r.date],
      r.teacher    && ['Teacher', r.teacher],
      r.class_group && ['Class / group', r.class_group],
      r.subject    && ['Subject', r.subject],
    ].filter(Boolean).map(([k, v]) =>
      `<div class="dv-meta-row"><span class="dv-meta-key">${k}</span><span class="dv-meta-val">${v}</span></div>`
    ).join('');
    const conf = typeof r.confidence === 'number' ? r.confidence : null;
    const confBadge = conf !== null
      ? `<div><span class="dv-conf ${conf >= 75 ? 'dv-conf-high' : 'dv-conf-low'}">${conf}% extraction confidence</span></div>`
      : '';

    backdrop.innerHTML = `
      <div class="dv-modal">
        <div class="dv-header">
          <span class="dv-title">${r.summary || 'Document preview'}</span>
          ${r.doc_type ? `<span class="dv-badge">${r.doc_type}</span>` : ''}
          <button class="dv-close" id="dvClose">✕</button>
        </div>
        <div class="dv-body">
          <div class="dv-image-panel" id="dvImagePanel">
            ${imgSrc
              ? `<div class="dv-img-wrap" id="dvImgWrap"><img id="dvImg" src="${imgSrc}" alt="Document"></div>`
              : `<div class="dv-no-image">
                  <svg viewBox="0 0 48 48"><rect x="6" y="6" width="36" height="36" rx="4"/><path d="M6 32l10-10 8 8 6-6 12 12"/><circle cx="16" cy="18" r="3"/></svg>
                  <div>No image stored for this capture.</div>
                  <div style="font-size:11px;margin-top:6px">Images are saved when you upload<br>a document in this browser.</div>
                </div>`
            }
          </div>
          <div class="dv-fields-panel" id="dvFieldsPanel">
            <div class="dv-doc-summary">
              <div class="dv-doc-type">${r.doc_type ? r.doc_type.replace(/_/g, ' ') : 'Document'}</div>
              <div class="dv-doc-title">${r.summary || 'Captured document'}</div>
              ${metaRows ? `<div class="dv-doc-meta">${metaRows}</div>` : ''}
              ${r.free_text ? `<div class="dv-doc-narrative">${r.free_text.slice(0, 220)}${r.free_text.length > 220 ? '…' : ''}</div>` : ''}
              ${confBadge}
            </div>
            <div class="dv-fields-scroll">
              <div class="dv-fields-title">Extracted fields</div>
              <div id="dvFieldList"></div>
            </div>
          </div>
        </div>
      </div>`;

    document.body.appendChild(backdrop);
    requestAnimationFrame(() => requestAnimationFrame(() => backdrop.classList.add('open')));

    backdrop.addEventListener('click', e => { if (e.target === backdrop) closeDocViewer(); });
    document.getElementById('dvClose').addEventListener('click', closeDocViewer);
    const escHandler = e => { if (e.key === 'Escape') closeDocViewer(); };
    document.addEventListener('keydown', escHandler);
    backdrop._escHandler = escHandler;

    // Render field list with bidirectional hover
    const fieldList = document.getElementById('dvFieldList');
    const hasBbox = highlights.some(h => h.bbox && h.bbox.length === 4);

    highlights.forEach((h, i) => {
      const color = HIGHLIGHT_COLORS[i % HIGHLIGHT_COLORS.length];
      const hasBb = !!(h.bbox && h.bbox.length === 4);
      const div = document.createElement('div');
      div.className = 'dv-field' + (hasBb ? '' : ' no-bbox');
      div.dataset.index = i;
      div.style.color = color;
      div.innerHTML = `
        <div class="dv-dot" style="background:${color}"></div>
        <div class="dv-field-body">
          <div class="dv-field-label">${h.label}</div>
          <div class="dv-field-value">${h.value || '—'}</div>
        </div>`;
      if (hasBb) {
        // field hover → highlight rect on image
        div.addEventListener('mouseenter', () => setRectState(i, 'hover', highlights));
        div.addEventListener('mouseleave', () => {
          if (!div.classList.contains('active')) setRectState(i, 'default', highlights);
        });
        div.addEventListener('click', () => lockField(i, highlights, color));
      }
      fieldList.appendChild(div);
    });

    if (!hasBbox) {
      const note = document.createElement('div');
      note.style.cssText = 'font-size:11px;color:var(--hint);margin-top:12px;line-height:1.6;';
      note.textContent = 'Upload a new document to see position highlights on the image.';
      fieldList.appendChild(note);
    }

    // Draw stable rects once image loads
    if (imgSrc) {
      const img = document.getElementById('dvImg');
      const drawAll = () => buildSvgRects(img, highlights);
      if (img.complete && img.naturalWidth) drawAll();
      else img.addEventListener('load', drawAll);
    }
  }

  function buildSvgRects(img, highlights) {
    const wrap = document.getElementById('dvImgWrap');
    if (!wrap || !img.offsetWidth) return;
    let svg = document.getElementById('dvSvg');
    if (!svg) {
      svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.id = 'dvSvg';
      svg.classList.add('dv-svg');
      wrap.appendChild(svg);
    }
    svg.setAttribute('viewBox', `0 0 ${img.offsetWidth} ${img.offsetHeight}`);

    highlights.forEach((h, i) => {
      if (!h.bbox || h.bbox.length !== 4) return;
      const color = HIGHLIGHT_COLORS[i % HIGHLIGHT_COLORS.length];
      const [yn, xn, yx, xx] = h.bbox;
      const w = img.offsetWidth, ht = img.offsetHeight;
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.id = `dv-rect-${i}`;
      rect.setAttribute('x', (xn / 1000) * w);
      rect.setAttribute('y', (yn / 1000) * ht);
      rect.setAttribute('width', Math.max(((xx - xn) / 1000) * w, 10));
      rect.setAttribute('height', Math.max(((yx - yn) / 1000) * ht, 10));
      rect.setAttribute('rx', '3');
      rect.setAttribute('fill', color + '18');
      rect.setAttribute('stroke', color);
      rect.setAttribute('stroke-width', '1');
      rect.setAttribute('stroke-opacity', '0.5');
      rect.setAttribute('pointer-events', 'all');
      rect.style.cursor = 'pointer';
      // rect hover → highlight field in panel
      rect.addEventListener('mouseenter', () => {
        setRectState(i, 'hover', highlights);
        const field = document.querySelector(`.dv-field[data-index="${i}"]`);
        if (field) { field.classList.add('hovered'); field.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }
      });
      rect.addEventListener('mouseleave', () => {
        const field = document.querySelector(`.dv-field[data-index="${i}"]`);
        if (field) field.classList.remove('hovered');
        const isActive = document.querySelector(`.dv-field.active[data-index="${i}"]`);
        if (!isActive) setRectState(i, 'default', highlights);
      });
      rect.addEventListener('click', () => {
        const color2 = HIGHLIGHT_COLORS[i % HIGHLIGHT_COLORS.length];
        lockField(i, highlights, color2);
      });
      svg.appendChild(rect);
    });
  }

  function setRectState(index, state, highlights) {
    const rect = document.getElementById(`dv-rect-${index}`);
    if (!rect) return;
    const color = HIGHLIGHT_COLORS[index % HIGHLIGHT_COLORS.length];
    if (state === 'active') {
      rect.setAttribute('fill', color + '30');
      rect.setAttribute('stroke-width', '2.5');
      rect.setAttribute('stroke-opacity', '1');
    } else if (state === 'hover') {
      rect.setAttribute('fill', color + '28');
      rect.setAttribute('stroke-width', '2');
      rect.setAttribute('stroke-opacity', '0.85');
    } else {
      rect.setAttribute('fill', color + '18');
      rect.setAttribute('stroke-width', '1');
      rect.setAttribute('stroke-opacity', '0.5');
    }
  }

  function lockField(index, highlights, color) {
    // Clear previous lock
    document.querySelectorAll('.dv-field.active').forEach(el => {
      setRectState(+el.dataset.index, 'default', highlights);
      el.classList.remove('active');
    });
    const field = document.querySelector(`.dv-field[data-index="${index}"]`);
    if (field) { field.classList.add('active'); field.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }
    setRectState(index, 'active', highlights);

    // Floating label
    const img = document.getElementById('dvImg');
    const svg = document.getElementById('dvSvg');
    if (!img || !svg) return;
    const h = highlights[index];
    if (!h || !h.bbox) return;
    svg.querySelectorAll('.dv-lbl,.dv-lbg').forEach(el => el.remove());
    const [yn, xn] = h.bbox;
    const lx = Math.min((xn / 1000) * img.offsetWidth, img.offsetWidth - h.label.length * 6.5 - 12);
    const ly = Math.max(0, (yn / 1000) * img.offsetHeight - 20);
    const tw = h.label.length * 6.5 + 10;
    const lbg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    lbg.setAttribute('class', 'dv-lbg');
    lbg.setAttribute('x', lx - 4); lbg.setAttribute('y', ly);
    lbg.setAttribute('width', tw); lbg.setAttribute('height', 17);
    lbg.setAttribute('rx', '4'); lbg.setAttribute('fill', 'rgba(255,255,255,.9)');
    lbg.setAttribute('pointer-events', 'none');
    const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    lbl.setAttribute('class', 'dv-lbl');
    lbl.setAttribute('x', lx); lbl.setAttribute('y', ly + 12);
    lbl.setAttribute('font-size', '11'); lbl.setAttribute('font-family', 'Inter,system-ui,sans-serif');
    lbl.setAttribute('font-weight', '600'); lbl.setAttribute('fill', color);
    lbl.setAttribute('pointer-events', 'none');
    lbl.textContent = h.label;
    svg.appendChild(lbg); svg.appendChild(lbl);
  }

  function closeDocViewer() {
    const backdrop = document.getElementById('dvBackdrop');
    if (!backdrop) return;
    if (backdrop._escHandler) document.removeEventListener('keydown', backdrop._escHandler);
    backdrop.classList.remove('open');
    setTimeout(() => backdrop.remove(), 220);
  }
</script>
</body>
</html>
