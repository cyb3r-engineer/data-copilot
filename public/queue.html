<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Co-Pilot — Review Queue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #181c27; --surface2: #1f2435;
      --border: #2a3045; --border2: #3a4560;
      --text: #e8eaf2; --muted: #7a82a0; --hint: #454d6a;
      --accent: #6b8afd; --accent-bg: #1a2040;
      --success: #34c47a; --success-bg: #0e2a1c;
      --warn: #f5a623; --warn-bg: #2a1f08;
      --danger: #f06060; --danger-bg: #2a1010;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', system-ui, sans-serif;
      --radius: 10px; --radius-sm: 6px;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    header { padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--surface); }
    .logo { width: 28px; height: 28px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
    .logo svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    header h1 { font-size: 15px; font-weight: 600; }
    nav { margin-left: auto; display: flex; gap: 4px; }
    .nav-btn { padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: var(--sans); font-size: 12px; font-weight: 500; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: all .15s; }
    .nav-btn:hover { border-color: var(--border2); color: var(--text); }
    .nav-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
    .page-body { flex: 1; max-width: 900px; margin: 0 auto; width: 100%; padding: 28px 24px; }
    .page-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .page-header h2 { font-size: 18px; font-weight: 600; }
    .filter-row { display: flex; gap: 6px; margin-left: auto; }
    .filter-btn { padding: 5px 12px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: var(--sans); font-size: 11px; font-weight: 500; cursor: pointer; transition: all .15s; }
    .filter-btn:hover { border-color: var(--border2); color: var(--text); }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
    .queue-list { display: flex; flex-direction: column; gap: 10px; }
    .capture-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color .15s; }
    .capture-card:hover { border-color: var(--border2); }
    .capture-card.expanded { border-color: var(--accent); }
    .card-header { padding: 14px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-needs-review { background: var(--warn); box-shadow: 0 0 6px var(--warn); }
    .dot-ready { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .dot-approved { background: var(--hint); }
    .card-summary { font-size: 13px; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .doc-badge { font-size: 10px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; padding: 2px 7px; border-radius: 99px; }
    .badge-assessment { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent); }
    .badge-observation { background: var(--success-bg); color: var(--success); border: 1px solid var(--success); }
    .badge-iep { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn); }
    .badge-behaviour { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger); }
    .badge-unknown { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .card-time { font-size: 11px; color: var(--hint); }
    .card-chevron { font-size: 12px; color: var(--hint); transition: transform .2s; }
    .capture-card.expanded .card-chevron { transform: rotate(180deg); }
    .card-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
    .capture-card.expanded .card-body { display: block; }
    .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 6px; margin-top: 14px; }
    .detail-item { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; }
    .detail-key { font-size: 10px; color: var(--hint); margin-bottom: 3px; }
    .detail-val { font-size: 12px; font-weight: 500; }
    .student-list { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
    .student-row { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; display: flex; align-items: center; gap: 8px; }
    .avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--accent-bg); border: 1px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; color: var(--accent); flex-shrink: 0; }
    .student-name { font-size: 12px; font-weight: 500; flex: 1; }
    .student-score { font-family: var(--mono); font-size: 12px; color: var(--accent); }
    .flag-list { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
    .flag-item { background: var(--warn-bg); border: 1px solid var(--warn); border-radius: var(--radius-sm); padding: 7px 10px; font-size: 11px; color: var(--warn); display: flex; gap: 7px; line-height: 1.5; }
    .section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--hint); margin-top: 14px; margin-bottom: 6px; }
    .note-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; font-family: var(--sans); font-size: 12px; color: var(--text); resize: vertical; min-height: 60px; margin-top: 10px; }
    .note-input:focus { outline: none; border-color: var(--accent); }
    .card-actions { display: flex; gap: 8px; margin-top: 12px; }
    .card-btn { flex: 1; padding: 8px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-family: var(--sans); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; }
    .card-btn:hover { border-color: var(--border2); color: var(--text); }
    .card-btn.approve { border-color: var(--success); background: var(--success-bg); color: var(--success); }
    .card-btn.approve:hover { background: #1a3a281a; }
    .card-btn.flag { border-color: var(--warn); background: var(--warn-bg); color: var(--warn); }
    .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; gap: 14px; color: var(--muted); }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--hint); }
    .empty-state p { font-size: 14px; margin-top: 10px; line-height: 1.6; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  </style>
</head>
<body>
<header>
  <div class="logo">
    <svg viewBox="0 0 16 16"><path d="M8 2L2 6v8h12V6L8 2z"/><path d="M6 14V9h4v5"/></svg>
  </div>
  <h1>Data Co-Pilot</h1>
  <nav>
    <a class="nav-btn" href="/">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="3" width="12" height="10" rx="1"/><circle cx="8" cy="8" r="2"/></svg>
      Capture
    </a>
    <a class="nav-btn active" href="/queue.html">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 4h10M3 8h6M3 12h8"/></svg>
      Review queue
    </a>
  </nav>
</header>

<div class="page-body">
  <div class="page-header">
    <h2>Review queue</h2>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('needs_review', this)">Needs review</button>
      <button class="filter-btn" onclick="setFilter('ready', this)">Ready</button>
      <button class="filter-btn" onclick="setFilter('approved', this)">Approved</button>
    </div>
  </div>
  <div id="queueList">
    <div class="loading-state"><div class="spinner"></div><p>Loading captures…</p></div>
  </div>
</div>

<script>
  let allCaptures = [];
  let activeFilter = 'all';

  async function loadQueue() {
    try {
      const res = await fetch('/api/queue');
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      allCaptures = data.captures || [];
      renderQueue();
    } catch(e) {
      document.getElementById('queueList').innerHTML = `<div class="empty-state"><p style="color:var(--danger)">${e.message}</p></div>`;
    }
  }

  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderQueue();
  }

  function renderQueue() {
    const list = document.getElementById('queueList');
    const filtered = activeFilter === 'all' ? allCaptures : allCaptures.filter(c => c.status === activeFilter);

    if (!filtered.length) {
      list.innerHTML = `<div class="empty-state"><p>No captures yet${activeFilter !== 'all' ? ' with this status' : ''}.<br>Go to <a href="/" style="color:var(--accent)">Capture</a> to add some.</p></div>`;
      return;
    }

    list.innerHTML = `<div class="queue-list">${filtered.map(c => cardHtml(c)).join('')}</div>`;
    filtered.forEach(c => {
      document.getElementById(`card-${c.id}`).addEventListener('click', e => {
        if (e.target.closest('button, textarea')) return;
        toggleCard(c.id);
      });
    });
  }

  function ini(name) {
    return (name || '?').split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function timeAgo(ts) {
    const diff = Date.now() - new Date(ts);
    const m = Math.floor(diff / 60000);
    if (m < 1) return 'just now';
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h ago`;
    return `${Math.floor(h / 24)}d ago`;
  }

  function dotClass(status) {
    if (status === 'needs_review') return 'dot-needs-review';
    if (status === 'approved') return 'dot-approved';
    return 'dot-ready';
  }

  function cardHtml(c) {
    const r = c.result_json || {};
    const bc = 'badge-' + (r.doc_type || 'unknown');
    const students = r.students || [];
    const flags = r.flags || [];
    const meta = [['Date', r.date], ['Teacher', r.teacher], ['Subject', r.subject], ['Class', r.class_group]].filter(([, v]) => v);

    let body = '';
    if (r.summary) body += `<p style="font-size:13px;color:var(--muted);margin-top:14px;line-height:1.6">${r.summary}</p>`;

    if (meta.length) {
      body += `<div class="detail-grid">`;
      for (const [k, v] of meta) body += `<div class="detail-item"><div class="detail-key">${k}</div><div class="detail-val">${v}</div></div>`;
      body += `</div>`;
    }

    if (students.length) {
      body += `<div class="section-label">Students (${students.length})</div><div class="student-list">`;
      for (const s of students) body += `<div class="student-row"><div class="avatar">${ini(s.name)}</div><span class="student-name">${s.name}</span>${s.score ? `<span class="student-score">${s.score}</span>` : ''}</div>`;
      body += `</div>`;
    }

    if (flags.length) {
      body += `<div class="section-label">Flags (${flags.length})</div><div class="flag-list">`;
      for (const f of flags) body += `<div class="flag-item"><span>⚑</span><span>${f}</span></div>`;
      body += `</div>`;
    }

    body += `
      <div class="section-label">Teacher note</div>
      <textarea class="note-input" id="note-${c.id}" placeholder="Add a note before approving…">${c.teacher_note || ''}</textarea>
      <div class="card-actions">
        <button class="card-btn approve" onclick="updateCapture('${c.id}', 'approved')">Approve</button>
        <button class="card-btn flag" onclick="updateCapture('${c.id}', 'needs_review')">Flag for review</button>
        <button class="card-btn" onclick="updateCapture('${c.id}', 'ready')">Mark ready</button>
      </div>`;

    return `
      <div class="capture-card" id="card-${c.id}">
        <div class="card-header">
          <span class="status-dot ${dotClass(c.status)}"></span>
          <span class="card-summary">${r.summary || 'Untitled capture'}</span>
          <div class="card-meta">
            <span class="doc-badge ${bc}">${r.doc_type || 'unknown'}</span>
            <span class="card-time">${timeAgo(c.created_at)}</span>
            <span class="card-chevron">▾</span>
          </div>
        </div>
        <div class="card-body">${body}</div>
      </div>`;
  }

  function toggleCard(id) {
    const card = document.getElementById(`card-${id}`);
    card.classList.toggle('expanded');
  }

  async function updateCapture(id, status) {
    const note = document.getElementById(`note-${id}`)?.value || '';
    try {
      await fetch('/api/update', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, status, teacher_note: note })
      });
      await loadQueue();
    } catch(e) {
      alert('Update failed: ' + e.message);
    }
  }

  loadQueue();
</script>
</body>
</html>
