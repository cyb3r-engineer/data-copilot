<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Co-Pilot — Review Queue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f2ee;
      --surface: #faf8f5;
      --border: #e8e3dc;
      --text: #1a1a1a;
      --muted: #888077;
      --hint: #b8b0a5;
      --accent: #1a1a1a;
      --accent-light: #f0ede8;
      --border-hover: #ccc6be;
      --border-strong: #aaa49d;
      --warn-border: #e4d3b8;
      --success: #2d7a4f;
      --warn: #a06b1a;
      --danger: #c0392b;
      --sans: 'Inter', system-ui, sans-serif;
      --radius: 12px;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

    /* Sidebar */
    .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 14px; }
    .sidebar-brand { display: flex; align-items: center; gap: 9px; padding: 4px 10px 24px; font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
    .logo-mark { font-size: 18px; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 2px; }
    .side-link { display: flex; align-items: center; gap: 11px; padding: 9px 10px; border-radius: 8px; color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 500; transition: background .15s, color .15s; }
    .side-link svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .side-link:hover { background: var(--accent-light); color: var(--text); }
    .side-link.active { background: var(--accent-light); color: var(--text); }
    .sidebar-foot { margin-top: auto; display: flex; flex-direction: column; gap: 10px; }
    .upload-btn { display: inline-flex; width: 100%; align-items: center; justify-content: center; gap: 8px; padding: 10px 20px; background: var(--text); color: var(--surface); border: none; border-radius: 99px; font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; transition: background .15s; position: relative; overflow: hidden; }
    .upload-btn:hover { background: #333; }
    .upload-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .upload-btn input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
    .upload-btn.uploading { opacity: .6; pointer-events: none; }
    .upload-status { font-size: 12px; color: var(--muted); text-align: center; min-height: 16px; }
    .upload-status.success { color: var(--success); }
    .upload-status.error { color: var(--danger); }

    main.content { margin-left: 220px; flex: 1; min-width: 0; }
    /* Page */
    .page { max-width: 680px; margin: 0 auto; padding: 48px 24px; }

    @media (max-width: 700px) {
      body { flex-direction: column; }
      .sidebar { position: sticky; width: auto; flex-direction: row; align-items: center; border-right: none; border-bottom: 1px solid var(--border); padding: 10px 14px; }
      .sidebar-brand { padding: 0 14px 0 6px; }
      .sidebar-nav { flex-direction: row; gap: 4px; }
      .side-link span { display: none; }
      .side-link { padding: 9px; }
      .sidebar-foot { margin-top: 0; margin-left: auto; flex-direction: row; align-items: center; }
      .upload-btn { width: auto; }
      .upload-status { display: none; }
      main.content { margin-left: 0; }
    }
    .page-title { font-size: 22px; font-weight: 600; letter-spacing: -.02em; margin-bottom: 4px; }
    .page-subtitle { font-size: 14px; color: var(--muted); margin-bottom: 32px; }

    /* Filters */
    .filter-row { display: flex; gap: 6px; margin-bottom: 28px; }
    .filter-btn { padding: 6px 14px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: var(--sans); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; }
    .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .filter-btn.active { background: var(--text); color: var(--surface); border-color: var(--text); }

    /* Section label */
    .section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--hint); margin-bottom: 12px; }

    /* Queue rows */
    .queue-list { display: flex; flex-direction: column; }
    .capture-row { border-top: 1px solid var(--border); padding: 16px 0; cursor: pointer; transition: background .1s; }
    .capture-row:last-child { border-bottom: 1px solid var(--border); }
    .row-main { display: flex; align-items: center; gap: 12px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-needs-review { background: var(--warn); }
    .dot-ready { background: var(--success); }
    .dot-approved { background: var(--hint); }
    .row-summary { font-size: 14px; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .doc-tag { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
    .row-time { font-size: 12px; color: var(--hint); }
    .row-chevron { font-size: 11px; color: var(--hint); transition: transform .2s; }
    .capture-row.expanded .row-chevron { transform: rotate(180deg); }

    /* Expanded body */
    .row-body { display: none; padding: 16px 0 8px 19px; }
    .capture-row.expanded .row-body { display: block; }
    .row-summary-text { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 16px; }
    .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-bottom: 16px; }
    .detail-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
    .detail-key { font-size: 10px; color: var(--hint); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .05em; }
    .detail-val { font-size: 13px; font-weight: 500; }
    .student-list { display: flex; flex-direction: column; margin-bottom: 16px; }
    .student-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-top: 1px solid var(--border); }
    .student-row:last-child { border-bottom: 1px solid var(--border); }
    .avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--accent-light); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; color: var(--muted); flex-shrink: 0; }
    .student-name { font-size: 13px; flex: 1; }
    .student-score { font-size: 13px; font-weight: 500; color: var(--muted); }
    .flag-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .flag-card { border: 1px solid #e4d3b8; background: #fdf9f1; border-radius: 8px; padding: 11px 12px; transition: all .15s; }
    .flag-card.resolved { border-color: #bfe0cc; background: #f3faf5; }
    .flag-q { font-size: 12px; color: var(--warn); line-height: 1.5; display: flex; gap: 7px; margin-bottom: 8px; }
    .flag-card.resolved .flag-q { color: var(--success); }
    .flag-input-row { display: flex; gap: 6px; }
    .flag-resolve { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; font-family: var(--sans); font-size: 13px; color: var(--text); }
    .flag-resolve:focus { outline: none; border-color: var(--border-strong); }
    .flag-add-btn { flex-shrink: 0; padding: 7px 16px; border-radius: 6px; border: 1px solid var(--text); background: var(--text); color: var(--surface); font-family: var(--sans); font-size: 12px; font-weight: 500; cursor: pointer; transition: background .15s; }
    .flag-add-btn:hover { background: #333; }
    .flag-add-btn:disabled { opacity: .6; cursor: default; }
    .flag-resolved-msg { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--success); }
    .flag-resolved-msg span { flex: 1; }
    .flag-resolved-msg strong { font-weight: 600; color: var(--text); }
    .flag-edit-btn { flex-shrink: 0; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: var(--sans); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; }
    .flag-edit-btn:hover { border-color: var(--border-strong); color: var(--text); }
    .note-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-family: var(--sans); font-size: 13px; color: var(--text); resize: vertical; min-height: 64px; margin-bottom: 12px; }
    .note-input:focus { outline: none; border-color: var(--border-strong); }
    .card-actions { display: flex; gap: 8px; }
    .card-btn { padding: 8px 16px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: var(--sans); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; }
    .card-btn:hover { border-color: var(--border-strong); color: var(--text); }
    .card-btn.approve { background: var(--text); color: var(--surface); border-color: var(--text); }
    .card-btn.approve:hover { background: #333; }
    .card-btn.flag { color: var(--warn); border-color: var(--warn-border); }

    /* States */
    .loading-state { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 60px; color: var(--muted); font-size: 14px; }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--hint); font-size: 14px; line-height: 1.7; }
    .empty-state a { color: var(--text); }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand"><span class="logo-mark">✦</span><span>Data Co-Pilot</span></div>
  <nav class="sidebar-nav">
    <a class="side-link" href="/">
      <svg viewBox="0 0 20 20"><path d="M3 8.5L10 3l7 5.5"/><path d="M5 7.5V16h10V7.5"/><path d="M8.5 16v-4h3v4"/></svg>
      <span>Home</span>
    </a>
    <a class="side-link active" href="/queue.html">
      <svg viewBox="0 0 20 20"><path d="M3 11l2.2-6.2a1 1 0 0 1 .94-.66h7.72a1 1 0 0 1 .94.66L17 11v4.5a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/><path d="M3 11h3.5l1 1.8h5l1-1.8H17"/></svg>
      <span>Review queue</span>
    </a>
  </nav>
  <div class="sidebar-foot">
    <button class="upload-btn" id="uploadBtn">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 11V3M5 6l3-3 3 3"/><path d="M3 13h10"/></svg>
      Upload
      <input type="file" accept="image/*" onchange="handleUpload(this.files[0])">
    </button>
    <span class="upload-status" id="uploadStatus"></span>
  </div>
</aside>

<main class="content">
<div class="page">
  <div class="page-title">Review queue</div>
  <div class="page-subtitle">Captured documents waiting for your review.</div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('needs_review', this)">Needs review</button>
    <button class="filter-btn" onclick="setFilter('ready', this)">Ready</button>
    <button class="filter-btn" onclick="setFilter('approved', this)">Approved</button>
  </div>

  <div id="queueList">
    <div class="loading-state"><div class="spinner"></div>Loading…</div>
  </div>
</div>
</main>

<script>
  let allCaptures = [];
  let activeFilter = 'all';

  async function loadQueue() {
    try {
      const res = await fetch('/api/queue');
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      allCaptures = data.captures || [];
      renderQueue();
    } catch(e) {
      document.getElementById('queueList').innerHTML = `<div class="empty-state" style="color:var(--danger)">${e.message}</div>`;
    }
  }

  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderQueue();
  }

  function renderQueue() {
    const list = document.getElementById('queueList');
    const filtered = activeFilter === 'all' ? allCaptures : allCaptures.filter(c => c.status === activeFilter);
    if (!filtered.length) {
      list.innerHTML = `<div class="empty-state">No captures yet${activeFilter !== 'all' ? ' with this status' : ''}.</div>`;
      return;
    }
    list.innerHTML = `<div class="queue-list">${filtered.map(c => cardHtml(c)).join('')}</div>`;
    filtered.forEach(c => {
      document.getElementById(`card-${c.id}`).addEventListener('click', e => {
        if (e.target.closest('button, textarea, input')) return;
        toggleCard(c.id);
      });
    });
  }

  function ini(name) {
    return (name || '?').split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function timeAgo(ts) {
    const diff = Date.now() - new Date(ts);
    const m = Math.floor(diff / 60000);
    if (m < 1) return 'just now';
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h ago`;
    return `${Math.floor(h / 24)}d ago`;
  }

  function dotClass(status) {
    if (status === 'needs_review') return 'dot-needs-review';
    if (status === 'approved') return 'dot-approved';
    return 'dot-ready';
  }

  function flagInputType(flag) {
    return /\b(date|year|when|day|month|dob|d\.o\.b|birth|deadline|due)\b/i.test(flag) ? 'date' : 'text';
  }

  function flagInputRow(id, index, flagEnc, value, flagText, btnLabel) {
    const type = flagInputType(flagText);
    const v = (value || '').replace(/"/g, '&quot;');
    const placeholder = type === 'date' ? '' : 'Add the missing info…';
    return `
      <div class="flag-input-row">
        <input class="flag-resolve" type="${type}" id="flagres-${id}-${index}" data-flag="${flagEnc}"
          placeholder="${placeholder}" value="${v}"
          onkeydown="if(event.key==='Enter'){event.preventDefault();saveResolution('${id}',${index})}">
        <button class="flag-add-btn" onclick="saveResolution('${id}',${index})">${btnLabel}</button>
      </div>`;
  }

  function cardHtml(c) {
    const r = c.result_json || {};
    const students = r.students || [];
    const flags = r.flags || [];
    const meta = [['Date', r.date], ['Teacher', r.teacher], ['Subject', r.subject], ['Class', r.class_group]].filter(([, v]) => v);

    let body = '';
    if (r.summary) body += `<div class="row-summary-text">${r.summary}</div>`;

    if (meta.length) {
      body += `<div class="section-label">Details</div><div class="detail-grid">`;
      for (const [k, v] of meta) body += `<div class="detail-item"><div class="detail-key">${k}</div><div class="detail-val">${v}</div></div>`;
      body += `</div>`;
    }

    if (students.length) {
      body += `<div class="section-label">Students (${students.length})</div><div class="student-list">`;
      for (const s of students) body += `<div class="student-row"><div class="avatar">${ini(s.name)}</div><span class="student-name">${s.name}</span>${s.score ? `<span class="student-score">${s.score}</span>` : ''}</div>`;
      body += `</div>`;
    }

    if (flags.length) {
      const resolutions = (r.flag_resolutions || []);
      body += `<div class="section-label" style="margin-top:16px">Needs your input (${flags.length})</div><div class="flag-list">`;
      flags.forEach((f, i) => {
        const resolved = resolutions.find(x => x.flag === f);
        body += `
          <div class="flag-card ${resolved ? 'resolved' : ''}" id="flagcard-${c.id}-${i}">
            <div class="flag-q"><span>${resolved ? '✓' : '↳'}</span><span>${f}</span></div>
            ${flagInputRow(c.id, i, encodeURIComponent(f), resolved ? resolved.resolution : '', f, resolved ? 'Update' : 'Add')}
          </div>`;
      });
      body += `</div>`;
    }

    body += `
      <div class="section-label" style="margin-top:16px">Teacher note</div>
      <textarea class="note-input" id="note-${c.id}" placeholder="Add a note before approving…">${c.teacher_note || ''}</textarea>
      <div class="card-actions">
        <button class="card-btn approve" onclick="updateCapture('${c.id}', 'approved')">Approve</button>
        <button class="card-btn flag" onclick="updateCapture('${c.id}', 'needs_review')">Flag for review</button>
        <button class="card-btn" onclick="updateCapture('${c.id}', 'ready')">Mark ready</button>
      </div>`;

    return `
      <div class="capture-row" id="card-${c.id}">
        <div class="row-main">
          <span class="status-dot ${dotClass(c.status)}"></span>
          <span class="row-summary">${r.summary || 'Untitled capture'}</span>
          <div class="row-right">
            <span class="doc-tag">${r.doc_type || '—'}</span>
            <span class="row-time">${timeAgo(c.created_at)}</span>
            <span class="row-chevron">▾</span>
          </div>
        </div>
        <div class="row-body">${body}</div>
      </div>`;
  }

  function toggleCard(id) {
    document.getElementById(`card-${id}`).classList.toggle('expanded');
  }

  async function saveResolution(id, index) {
    const input = document.getElementById(`flagres-${id}-${index}`);
    const val = input.value.trim();
    if (!val) { input.focus(); return; }

    const capture = allCaptures.find(c => c.id === id);
    if (!capture) return;
    const flag = decodeURIComponent(input.dataset.flag);
    const result_json = { ...capture.result_json };
    const resolutions = (result_json.flag_resolutions || []).filter(x => x.flag !== flag);
    resolutions.push({ flag, resolution: val });
    result_json.flag_resolutions = resolutions;

    const btn = input.nextElementSibling;
    const prevLabel = btn.textContent;
    btn.textContent = 'Saving…';
    btn.disabled = true;
    try {
      await fetch('/api/update', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, status: capture.status, teacher_note: document.getElementById(`note-${id}`)?.value || capture.teacher_note, result_json })
      });
      capture.result_json = result_json; // keep local state in sync without re-rendering
      const card = document.getElementById(`flagcard-${id}-${index}`);
      card.classList.add('resolved');
      card.innerHTML = `
        <div class="flag-q"><span>✓</span><span>${flag}</span></div>
        <div class="flag-resolved-msg">
          <span>Information updated — <strong>"${val.replace(/"/g, '&quot;')}"</strong></span>
          <button class="flag-edit-btn" onclick="editResolution('${id}',${index},'${input.dataset.flag}')">Edit</button>
        </div>`;
    } catch(e) {
      btn.textContent = prevLabel;
      btn.disabled = false;
      alert('Save failed: ' + e.message);
    }
  }

  function editResolution(id, index, flagEnc) {
    const capture = allCaptures.find(c => c.id === id);
    const flag = decodeURIComponent(flagEnc);
    const resolved = (capture?.result_json?.flag_resolutions || []).find(x => x.flag === flag);
    const card = document.getElementById(`flagcard-${id}-${index}`);
    card.innerHTML = `
      <div class="flag-q"><span>↳</span><span>${flag}</span></div>
      ${flagInputRow(id, index, flagEnc, resolved ? resolved.resolution : '', flag, 'Update')}`;
    document.getElementById(`flagres-${id}-${index}`).focus();
  }

  async function updateCapture(id, status) {
    const note = document.getElementById(`note-${id}`)?.value || '';

    // Collect any flag resolutions the teacher filled in
    const capture = allCaptures.find(c => c.id === id);
    const result_json = capture ? { ...capture.result_json } : undefined;
    if (result_json) {
      const resolutions = [];
      document.querySelectorAll(`[id^="flagres-${id}-"]`).forEach(inp => {
        const val = inp.value.trim();
        if (val) resolutions.push({ flag: decodeURIComponent(inp.dataset.flag), resolution: val });
      });
      result_json.flag_resolutions = resolutions;
    }

    try {
      await fetch('/api/update', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, status, teacher_note: note, result_json })
      });
      await loadQueue();
    } catch(e) {
      alert('Update failed: ' + e.message);
    }
  }

  async function handleUpload(file) {
    if (!file) return;
    const btn = document.getElementById('uploadBtn');
    const status = document.getElementById('uploadStatus');
    btn.classList.add('uploading');
    status.className = 'upload-status';
    status.textContent = 'Uploading…';
    try {
      const fd = new FormData();
      fd.append('image', file);
      const res = await fetch('/api/parse', { method: 'POST', body: fd });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      status.className = 'upload-status success';
      status.textContent = 'Added ✓';
      await loadQueue();
      setTimeout(() => { status.textContent = ''; status.className = 'upload-status'; }, 2500);
    } catch(e) {
      status.className = 'upload-status error';
      status.textContent = e.message;
    }
    btn.classList.remove('uploading');
  }

  loadQueue();
</script>
</body>
</html>
