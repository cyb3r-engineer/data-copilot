<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Co-Pilot — Capture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #181c27; --surface2: #1f2435;
      --border: #2a3045; --border2: #3a4560;
      --text: #e8eaf2; --muted: #7a82a0; --hint: #454d6a;
      --accent: #6b8afd; --accent-bg: #1a2040;
      --success: #34c47a; --success-bg: #0e2a1c;
      --warn: #f5a623; --warn-bg: #2a1f08;
      --danger: #f06060; --danger-bg: #2a1010;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', system-ui, sans-serif;
      --radius: 10px; --radius-sm: 6px;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    header { padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--surface); }
    .logo { width: 28px; height: 28px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
    .logo svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    header h1 { font-size: 15px; font-weight: 600; }
    nav { margin-left: auto; display: flex; gap: 4px; }
    .nav-btn { padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: var(--sans); font-size: 12px; font-weight: 500; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: all .15s; }
    .nav-btn:hover { border-color: var(--border2); color: var(--text); }
    .nav-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
    main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; }
    .panel { display: flex; flex-direction: column; border-right: 1px solid var(--border); }
    .panel:last-child { border-right: none; }
    .panel-header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--surface); flex-shrink: 0; }
    .panel-title { font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); }
    .panel-tag { margin-left: auto; font-size: 10px; padding: 2px 8px; border-radius: 99px; border: 1px solid var(--border); color: var(--hint); }
    .panel-body { flex: 1; padding: 20px; overflow-y: auto; }
    .drop-zone { border: 1.5px dashed var(--border2); border-radius: var(--radius); padding: 32px 20px; text-align: center; cursor: pointer; transition: all .2s; position: relative; }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: var(--accent-bg); }
    .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .drop-zone svg { width: 32px; height: 32px; stroke: var(--hint); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; margin-bottom: 12px; }
    .drop-zone h3 { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
    .drop-zone p { font-size: 12px; color: var(--muted); line-height: 1.6; }
    .preview-wrap { margin-top: 16px; display: none; }
    .preview-wrap img { width: 100%; border-radius: var(--radius); border: 1px solid var(--border); display: block; max-height: 300px; object-fit: contain; background: var(--surface2); }
    .sample-placeholder { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; font-size: 12px; font-style: italic; color: var(--muted); line-height: 1.7; display: none; }
    .parse-btn { width: 100%; margin-top: 12px; padding: 11px 16px; border-radius: var(--radius); border: 1px solid var(--accent); background: var(--accent-bg); color: var(--accent); font-family: var(--sans); font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all .15s; }
    .parse-btn:hover { background: #20306060; }
    .parse-btn:disabled { opacity: .35; cursor: not-allowed; }
    .parse-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .divider { display: flex; align-items: center; gap: 10px; margin: 18px 0; }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-size: 11px; color: var(--hint); }
    .sample-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .sample-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; text-align: left; cursor: pointer; transition: all .15s; color: var(--text); }
    .sample-btn:hover { border-color: var(--accent); background: var(--accent-bg); }
    .sample-btn .s-icon { font-size: 16px; margin-bottom: 4px; display: block; }
    .sample-btn .s-name { font-size: 12px; font-weight: 500; display: block; }
    .sample-btn .s-desc { font-size: 10px; color: var(--muted); display: block; margin-top: 2px; }
    .result-empty { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--hint); text-align: center; }
    .result-empty svg { width: 36px; height: 36px; stroke: var(--hint); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .result-empty p { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .loading-state { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p { font-size: 13px; color: var(--muted); }
    .section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--hint); margin: 16px 0 8px; }
    .result-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
    .doc-badge { font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; padding: 3px 9px; border-radius: 99px; }
    .badge-assessment { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent); }
    .badge-observation { background: var(--success-bg); color: var(--success); border: 1px solid var(--success); }
    .badge-iep { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn); }
    .badge-behaviour { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger); }
    .badge-unknown { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .conf-pill { margin-left: auto; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .conf-bar { width: 60px; height: 4px; background: var(--border2); border-radius: 2px; overflow: hidden; }
    .conf-fill { height: 100%; border-radius: 2px; }
    .conf-high { background: var(--success); } .conf-med { background: var(--warn); } .conf-low { background: var(--danger); }
    .summary-box { font-size: 13px; color: var(--muted); line-height: 1.6; padding: 10px 12px; background: var(--surface2); border-radius: var(--radius-sm); border-left: 2px solid var(--border2); margin-bottom: 4px; }
    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .meta-item { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; }
    .meta-key { font-size: 10px; color: var(--hint); margin-bottom: 3px; }
    .meta-val { font-size: 13px; font-weight: 500; }
    .student-list { display: flex; flex-direction: column; gap: 6px; }
    .student-row { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; display: flex; align-items: flex-start; gap: 10px; }
    .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--accent-bg); border: 1px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: var(--accent); flex-shrink: 0; }
    .student-name { font-size: 13px; font-weight: 500; }
    .student-score { margin-left: auto; font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--accent); white-space: nowrap; }
    .student-note { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.5; }
    .free-text { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; font-size: 12px; font-style: italic; color: var(--muted); line-height: 1.7; }
    .flag-list { display: flex; flex-direction: column; gap: 6px; }
    .flag-item { background: var(--warn-bg); border: 1px solid var(--warn); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 12px; color: var(--warn); display: flex; gap: 8px; line-height: 1.5; }
    .action-row { display: flex; gap: 8px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
    .action-btn { flex: 1; padding: 9px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-family: var(--sans); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; }
    .action-btn:hover { border-color: var(--border2); color: var(--text); }
    .action-btn.primary { border-color: var(--success); background: var(--success-bg); color: var(--success); }
    .saved-toast { position: absolute; bottom: 20px; right: 20px; background: var(--success-bg); border: 1px solid var(--success); color: var(--success); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity .3s; pointer-events: none; }
    .saved-toast.show { opacity: 1; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    @media (max-width: 700px) { main { grid-template-columns: 1fr; } .panel { border-right: none; border-bottom: 1px solid var(--border); } }
  </style>
</head>
<body>
<header>
  <div class="logo">
    <svg viewBox="0 0 16 16"><path d="M8 2L2 6v8h12V6L8 2z"/><path d="M6 14V9h4v5"/></svg>
  </div>
  <h1>Data Co-Pilot</h1>
  <nav>
    <a class="nav-btn active" href="/">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="3" width="12" height="10" rx="1"/><circle cx="8" cy="8" r="2"/></svg>
      Capture
    </a>
    <a class="nav-btn" href="/queue.html">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 4h10M3 8h6M3 12h8"/></svg>
      Review queue
    </a>
  </nav>
</header>

<main>
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Capture</span>
      <span class="panel-tag">Phone / Chromebook</span>
    </div>
    <div class="panel-body">
      <div class="drop-zone" id="dropZone">
        <input type="file" accept="image/*" id="fileInput" onchange="handleFile(this.files[0])">
        <svg viewBox="0 0 32 32"><rect x="4" y="8" width="24" height="18" rx="2"/><path d="M4 13h24M11 8V6a1 1 0 011-1h9a1 1 0 011 1v2"/><circle cx="16" cy="20" r="4"/></svg>
        <h3>Upload a photo</h3>
        <p>Snap a data sheet, sticky note,<br>assessment grid or handwritten note</p>
      </div>
      <div class="preview-wrap" id="previewWrap">
        <img id="previewImg" alt="Uploaded document preview">
        <div id="samplePlaceholder" class="sample-placeholder"></div>
        <button class="parse-btn" id="parseBtn" onclick="runParse()" disabled>
          <svg viewBox="0 0 14 14"><path d="M7 1l1.8 4H13l-3.4 2.5 1.3 4L7 9 3.1 11.5l1.3-4L1 5h4.2z"/></svg>
          Parse with AI
        </button>
      </div>
      <div class="divider"><div class="divider-line"></div><span class="divider-text">or try a sample</span><div class="divider-line"></div></div>
      <div class="sample-grid">
        <button class="sample-btn" onclick="loadSample('assessment')"><span class="s-icon">📊</span><span class="s-name">Assessment grid</span><span class="s-desc">Marks, Year 4 maths</span></button>
        <button class="sample-btn" onclick="loadSample('sticky')"><span class="s-icon">🗒</span><span class="s-name">Sticky note</span><span class="s-desc">Observation, SENCO</span></button>
        <button class="sample-btn" onclick="loadSample('iep')"><span class="s-icon">📋</span><span class="s-name">IEP fragment</span><span class="s-desc">Target, current level</span></button>
        <button class="sample-btn" onclick="loadSample('behaviour')"><span class="s-icon">⚠️</span><span class="s-name">Behaviour log</span><span class="s-desc">Incident report</span></button>
      </div>
    </div>
  </div>

  <div class="panel" style="position:relative">
    <div class="panel-header">
      <span class="panel-title">Parsed result</span>
      <span class="panel-tag">Desktop review</span>
    </div>
    <div class="panel-body" id="resultPanel">
      <div class="result-empty">
        <svg viewBox="0 0 36 36"><rect x="4" y="6" width="28" height="24" rx="3"/><path d="M10 13h16M10 18h10M10 23h12"/></svg>
        <p>Upload an image or choose a sample<br>to see what the AI extracts</p>
      </div>
    </div>
    <div class="saved-toast" id="savedToast">Saved to review queue</div>
  </div>
</main>

<script>
  const SAMPLE_LABELS = {
    assessment: 'Assessment grid — Year 4 maths',
    sticky: 'Sticky note — observation',
    iep: 'IEP fragment',
    behaviour: 'Behaviour log'
  };
  const SAMPLE_DESCS = {
    assessment: 'A handwritten mark sheet for Year 4 maths. Headed "Fractions — 14/6 — MT". Six student rows: Jamie H 16/20, Sofia R 18/20, Tyler K 9/20 with a circle around the score, Amara O 14/20, Liam B 20/20 star next to it, Priya S score crossed out and rewritten as 12/20. Bottom note: "Tyler needs support — catch-up next Tue?"',
    sticky: 'A sticky note: "Jayden M — really struggled w/ place value today, kept reversing digits. Worth checking with SENCO? Great effort tho. Also — superb reading session, finished Bk 4! JB 17th June"',
    iep: 'A handwritten IEP note: "Pupil: Amara Osei  Target: Read 100 sight words independently by end of Spring term.  Current level: 67/100  Support: TA-assisted daily 10min reading (Miss Clarke).  Review date: 28 March"',
    behaviour: 'Behaviour incident: "Lunchtime — Tyler K + Sam P — pushing near hall. Both sent to cool-down room 12:50. Both parents contacted by phone. No injuries. Ms Davies 2:15pm Tues 18th"'
  };

  let currentMode = null;
  let lastResult = null;
  let lastId = null;

  function handleFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      currentMode = { type: 'file', file };
      document.getElementById('previewImg').src = e.target.result;
      document.getElementById('previewImg').style.display = 'block';
      document.getElementById('samplePlaceholder').style.display = 'none';
      document.getElementById('previewWrap').style.display = 'block';
      document.getElementById('dropZone').style.display = 'none';
      document.getElementById('parseBtn').disabled = false;
      showEmpty('Image ready — click Parse with AI');
    };
    reader.readAsDataURL(file);
  }

  function loadSample(key) {
    currentMode = { type: 'sample', key };
    document.getElementById('previewImg').style.display = 'none';
    const ph = document.getElementById('samplePlaceholder');
    ph.textContent = SAMPLE_DESCS[key];
    ph.style.display = 'block';
    document.getElementById('previewWrap').style.display = 'block';
    document.getElementById('dropZone').style.display = 'none';
    document.getElementById('parseBtn').disabled = false;
    showEmpty('Sample loaded — click Parse with AI');
  }

  function showEmpty(msg) {
    document.getElementById('resultPanel').innerHTML = `<div class="result-empty"><svg viewBox="0 0 36 36"><path d="M18 6v16M10 14l8 8 8-8"/><path d="M6 28h24"/></svg><p>${msg}</p></div>`;
  }

  async function runParse() {
    if (!currentMode) return;
    document.getElementById('parseBtn').disabled = true;
    document.getElementById('resultPanel').innerHTML = `<div class="loading-state"><div class="spinner"></div><p>Reading the document…</p></div>`;

    try {
      let res;
      if (currentMode.type === 'file') {
        const fd = new FormData();
        fd.append('image', currentMode.file);
        res = await fetch('/api/parse', { method: 'POST', body: fd });
      } else {
        res = await fetch('/api/parse', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sample_key: currentMode.key }) });
      }
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      lastResult = data.result;
      lastId = data.id;
      renderResult(data.result);
      if (data.id) showToast();
    } catch(e) {
      document.getElementById('resultPanel').innerHTML = `<div style="background:var(--danger-bg);border:1px solid var(--danger);border-radius:var(--radius);padding:16px;font-size:13px;color:var(--danger);line-height:1.6"><strong>Parse failed</strong><br>${e.message}</div>`;
    }
    document.getElementById('parseBtn').disabled = false;
  }

  function showToast() {
    const t = document.getElementById('savedToast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function ini(name) {
    return (name || '?').split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function renderResult(d) {
    const conf = d.confidence ?? 0;
    const cc = conf >= 75 ? 'conf-high' : conf >= 50 ? 'conf-med' : 'conf-low';
    const ct = conf >= 75 ? 'High' : conf >= 50 ? 'Medium' : 'Low';
    const bc = 'badge-' + (d.doc_type || 'unknown');

    let h = `<div class="result-header"><span class="doc-badge ${bc}">${d.doc_type || 'unknown'}</span><span class="conf-pill">${ct}<span class="conf-bar"><span class="conf-fill ${cc}" style="width:${conf}%"></span></span>${conf}%</span></div>`;

    if (d.summary) h += `<div class="summary-box">${d.summary}</div>`;

    const meta = [['Date', d.date], ['Teacher', d.teacher], ['Subject', d.subject], ['Class / group', d.class_group]].filter(([, v]) => v);
    if (meta.length) {
      h += `<div class="section-label">Details</div><div class="meta-grid">`;
      for (const [k, v] of meta) h += `<div class="meta-item"><div class="meta-key">${k}</div><div class="meta-val">${v}</div></div>`;
      h += `</div>`;
    }

    if (d.students?.length) {
      h += `<div class="section-label">Students (${d.students.length})</div><div class="student-list">`;
      for (const s of d.students) {
        h += `<div class="student-row"><div class="avatar">${ini(s.name)}</div><div style="flex:1;min-width:0"><div class="student-name">${s.name}</div>${s.note ? `<div class="student-note">${s.note}</div>` : ''}</div>${s.score ? `<span class="student-score">${s.score}</span>` : ''}</div>`;
      }
      h += `</div>`;
    }

    if (d.free_text) h += `<div class="section-label">Free text</div><div class="free-text">"${d.free_text}"</div>`;

    if (d.flags?.length) {
      h += `<div class="section-label">Needs your attention (${d.flags.length})</div><div class="flag-list">`;
      for (const f of d.flags) h += `<div class="flag-item"><span>⚑</span><span>${f}</span></div>`;
      h += `</div>`;
    }

    h += `<div class="action-row"><button class="action-btn primary" onclick="window.location='/queue.html'">View review queue →</button><button class="action-btn" onclick="navigator.clipboard.writeText(JSON.stringify(lastResult,null,2))">Copy JSON</button></div>`;

    document.getElementById('resultPanel').innerHTML = h;
  }

  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f?.type.startsWith('image/')) handleFile(f); });
</script>
</body>
</html>
